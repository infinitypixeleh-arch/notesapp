<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfNotes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050505;
--panel:#0a0a0a;
--accent:#a29bfe;
--text:#888;
--text-focus:#e0e0e0;
--border:#151515;
--sidebar-w:240px;
--xp:#fdcb6e;
--credits:#00d2d3;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
height:100vh;
display:flex;
overflow:hidden;
}

aside{
width:var(--sidebar-w);
background:var(--panel);
border-right:1px solid var(--border);
padding:35px 20px;
display:flex;
flex-direction:column;
overflow-y:auto;
}

.nav-item{
padding:8px 10px;
cursor:pointer;
font-size:0.75rem;
border-radius:4px;
}

.nav-item:hover{background:#111;color:white}

.view-container{
flex:1;
display:flex;
}

.view{
display:none;
width:100%;
height:100%;
flex-direction:column;
}

.view.active{display:flex}

#rich-editor{
flex:1;
padding:20px 80px;
font-size:1rem;
line-height:1.8;
color:#c0c0c0;
outline:none;
overflow-y:auto;
}

.msg-bubble{
background:#111;
padding:12px 18px;
border-radius:8px;
max-width:70%;
border:1px solid #151515;
}

.store-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
margin-top:30px;
}

.store-card{
background:#0a0a0a;
border:1px solid #151515;
padding:20px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.page-controls{
position:fixed;
bottom:20px;
right:20px;
display:flex;
gap:10px;
}

</style>
</head>

<body>

<div id="auth-overlay" style="position:fixed;inset:0;background:#050505;display:flex;align-items:center;justify-content:center;z-index:5000">
<div style="width:300px;text-align:center">

<h1>INFNOTES</h1>

<input id="email" placeholder="Email" style="width:100%;padding:12px;margin-bottom:10px">

<input id="pass" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:20px">

<button id="login-btn">ENTER</button>

</div>
</div>

<aside>

<div id="my-lvl-text">LVL 1</div>
<div id="my-stars"></div>
<div id="my-creds">$0</div>

<div class="nav-item" onclick="showView('notes-view')">Notes</div>
<div class="nav-item" onclick="showView('messages-view')">Chat</div>
<div class="nav-item" onclick="renderLeaderboard()">Leaderboard</div>
<div class="nav-item" onclick="showView('store-view')">Market</div>

<div id="folder-root"></div>

<button onclick="createNewNote()">NEW NOTE</button>

</aside>

<div class="view-container">

<div id="notes-view" class="view active">

<input id="note-title">

<div id="rich-editor" contenteditable="true"></div>

<button onclick="shareNote()">Share</button>
<button onclick="summarizeNote()">Summarize</button>

</div>

<div id="messages-view" class="view">

<div id="chat-history"></div>

<input id="chat-in">
<button id="chat-send">SEND</button>

</div>

<div id="leaderboard-view" class="view">

<h3>GLOBAL WORD LEADERBOARD</h3>
<div id="leaderboard-list"></div>

</div>

<div id="store-view" class="view">

<h3>RARITY STORE</h3>

<div class="store-grid">

<div class="store-card" onclick="buyColor('#ff7675',50)">ROSE</div>
<div class="store-card" onclick="buyColor('#55efc4',50)">MINT</div>
<div class="store-card" onclick="buyColor('#74b9ff',50)">SKY</div>

<div class="store-card" onclick="buyTag('DEV',0)">DEV TAG</div>
<div class="store-card" onclick="buyTag('PRO',100)">PRO</div>
<div class="store-card" onclick="buyTag('ELITE',150)">ELITE</div>

<div class="store-card" onclick="sellNotePages()">SELL PAGES</div>

</div>

</div>

</div>

<div class="page-controls">
<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"
import { getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"
import { getFirestore,doc,setDoc,collection,query,where,onSnapshot,addDoc,updateDoc,getDocs,orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"
import { getDatabase,ref,push,onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"

const firebaseConfig={
apiKey:"AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
authDomain:"infnotes.firebaseapp.com",
projectId:"infnotes",
databaseURL:"https://infnotes-default-rtdb.asia-southeast1.firebasedatabase.app/",
storageBucket:"infnotes.firebasestorage.app",
messagingSenderId:"976520833702",
appId:"1:976520833702:web:ce8aa0afc1a6131da7e267"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)
const rtd=getDatabase(app)

let currentUser=null
let myData={}

onAuthStateChanged(auth,async u=>{
if(u){

currentUser=u

document.getElementById("auth-overlay").style.display="none"

onSnapshot(doc(db,"users",u.uid),(snap)=>{
myData=snap.data()||{}
})

init()

}
})

document.getElementById("login-btn").onclick=async()=>{

const e=email.value
const p=pass.value

try{

await signInWithEmailAndPassword(auth,e,p)

}catch{

await createUserWithEmailAndPassword(auth,e,p)

}

}

function init(){

onChildAdded(ref(rtd,'messages'),(snap)=>{

const m=snap.val()

const div=document.createElement("div")

div.className="msg-bubble"

div.innerHTML=
(m.tag? "["+m.tag+"] ":"")+
m.sender+
" "+("★".repeat(m.prestige||0))+
"<br>"+m.text

chat-history.appendChild(div)

})

}

chat-send.onclick=()=>{

const t=chat-in.value

if(!t)return

push(ref(rtd,'messages'),{

uid:currentUser.uid,
sender:currentUser.email.split("@")[0],
text:t,
prestige:myData.prestige||0,
tag:myData.activeTag,
color:myData.color

})

chat-in.value=""

}

function summarizeNote(){

const text=rich-editor.innerText

const sentences=text.split(/[.!?]/)

alert(sentences.slice(0,3).join("."))

}

function sellNotePages(){

const words=rich-editor.innerText.split(/\s+/).length

const pages=Math.floor(words/500)

const credits=pages*25

updateDoc(doc(db,"users",currentUser.uid),{

credits:(myData.credits||0)+credits

})

alert("Sold "+pages+" pages")

}

function buyColor(color,price){

updateDoc(doc(db,"users",currentUser.uid),{

color:color,
credits:(myData.credits||0)-price

})

}

const TAG_SUPPLY={DEV:1,PRO:10,ELITE:5}

function buyTag(tag,price){

if(TAG_SUPPLY[tag]<=0)return

TAG_SUPPLY[tag]--

updateDoc(doc(db,"users",currentUser.uid),{

activeTag:tag,
credits:(myData.credits||0)-price

})

}

function renderLeaderboard(){

showView("leaderboard-view")

getDocs(query(collection(db,"users"),orderBy("wordCount","desc")))

.then(snap=>{

leaderboard-list.innerHTML=""

snap.forEach(d=>{

const u=d.data()

const row=document.createElement("div")

row.innerText=
u.email.split("@")[0]+
" "+("★".repeat(u.prestige||0))+
" "+u.wordCount

leaderboard-list.appendChild(row)

})

})

}

let PAGE_SIZE=500
let currentPage=0

function nextPage(){

const words=rich-editor.innerText.split(/\s+/)

const pages=[]

for(let i=0;i<words.length;i+=PAGE_SIZE){

pages.push(words.slice(i,i+PAGE_SIZE).join(" "))

}

if(currentPage<pages.length-1){

currentPage++

rich-editor.innerText=pages[currentPage]

}

}

function prevPage(){

currentPage--

if(currentPage<0)currentPage=0

}

window.showView=id=>{

document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

window.createNewNote=async()=>{

await addDoc(collection(db,"notes"),{

title:"UNTITLED",
content:"",
access:[currentUser.uid],
owner:currentUser.uid

})

}

</script>

</body>
</html>
