<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfNotes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --panel:#111;
  --accent:#a29bfe;
  --text:#ccc;
  --text-focus:#fff;
  --border:#222;
  --sidebar-w:250px;
  --xp:#fdcb6e;
  --credits:#00d2d3;
  --card-bg:rgba(20,20,20,0.8);
  --card-shadow:0 4px 20px rgba(0,0,0,0.5);
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* Sidebar */
aside{
  width:var(--sidebar-w);
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}
#my-lvl-text{
  font-weight:600;
  margin-bottom:5px;
  font-size:1.1rem;
}
#my-stars{
  color:#fdcb6e;
  margin-bottom:5px;
}
#my-creds{
  color:#00d2d3;
  margin-bottom:15px;
}
.nav-item{
  padding:10px 12px;
  margin:4px 0;
  cursor:pointer;
  font-size:0.85rem;
  border-radius:6px;
  transition:0.2s;
}
.nav-item:hover{
  background:var(--accent);
  color:#111;
  font-weight:500;
}

/* Main view */
.view-container{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:20px;
}
.view{
  display:none;
  width:100%;
  height:100%;
  flex-direction:column;
}
.view.active{display:flex}

/* Notes editor */
#rich-editor{
  flex:1;
  padding:20px;
  font-size:1rem;
  line-height:1.8;
  color:#eee;
  outline:none;
  overflow-y:auto;
  background:var(--card-bg);
  border-radius:12px;
  margin-top:10px;
  border:1px solid var(--border);
  box-shadow:var(--card-shadow);
  backdrop-filter:blur(4px);
}
input, button{
  border:none;
  border-radius:6px;
  outline:none;
  font-size:0.9rem;
}
input{
  padding:10px;
  margin-bottom:10px;
  width:100%;
  background:#222;
  color:#eee;
}
button{
  cursor:pointer;
  padding:10px 16px;
  background:var(--accent);
  color:#111;
  font-weight:600;
  transition:0.2s;
}
button:hover{
  transform:scale(1.05);
}

/* Chat */
#chat-history{
  flex:1;
  overflow-y:auto;
  padding:15px;
}
.chat-bar{
  display:flex;
  margin-top:10px;
}
#chat-in{
  flex:1;
  padding:10px;
  border-radius:6px;
  background:#222;
  color:#eee;
  margin-right:10px;
  border:1px solid var(--border);
}
#chat-send{
  padding:10px 16px;
}

/* Chat bubbles */
.msg-bubble{
  background:var(--card-bg);
  padding:12px 18px;
  border-radius:12px;
  max-width:70%;
  border:1px solid var(--border);
  margin-bottom:8px;
  word-wrap:break-word;
  box-shadow:var(--card-shadow);
}

/* Leaderboard */
#leaderboard-list div{
  padding:10px;
  margin:5px 0;
  background:var(--card-bg);
  border-radius:10px;
  box-shadow:var(--card-shadow);
}

/* Store */
.store-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
  margin-top:20px;
}
.store-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  box-shadow:var(--card-shadow);
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.store-card:hover{
  transform:scale(1.05);
  background:rgba(160,155,254,0.15);
}
.store-card span{
  margin-top:8px;
  font-size:0.85rem;
  color:#aaa;
  font-weight:500;
}

/* Page controls */
.page-controls{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  gap:10px;
}
</style>
</head>

<body>

<!-- Auth Overlay -->
<div id="auth-overlay" style="position:fixed;inset:0;background:#050505;display:flex;align-items:center;justify-content:center;z-index:5000">
  <div style="width:300px;text-align:center">
    <h1>INFNOTES</h1>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button id="login-btn">ENTER</button>
  </div>
</div>

<aside>
  <div id="my-lvl-text">LVL 1</div>
  <div id="my-stars"></div>
  <div id="my-creds">$0</div>

  <div class="nav-item" onclick="showView('notes-view')">Notes</div>
  <div class="nav-item" onclick="showView('messages-view')">Chat</div>
  <div class="nav-item" onclick="renderLeaderboard()">Leaderboard</div>
  <div class="nav-item" onclick="showView('store-view')">Market</div>

  <div id="<div id="folder-root">
  <h4>Folders</h4>
  <div id="folders-list"></div>
  <button onclick="createNewFolder()">+ New Folder</button>
</div>"></div>
  <button onclick="createNewNote()">NEW NOTE</button>
</aside>

<div class="view-container">

  <div id="notes-view" class="view active">
    <input id="note-title" placeholder="Note Title">
    <div id="rich-editor" contenteditable="true"></div>
    <button onclick="shareNote()">Share</button>
    <button onclick="summarizeNote()">Summarize</button>
  </div>

  <div id="messages-view" class="view">
    <div id="chat-history" style="flex:1;overflow-y:auto;padding:20px"></div>
    <div class="chat-bar">
      <input id="chat-in" placeholder="Type a message...">
      <button id="chat-send">SEND</button>
    </div>
  </div>

  <div id="leaderboard-view" class="view">
    <h3>GLOBAL WORD LEADERBOARD</h3>
    <div id="leaderboard-list"></div>
  </div>

  <div id="store-view" class="view">
    <h3>RARITY STORE</h3>
    <div class="store-grid">
     <div class="store-card" onclick="buyColor('#ff7675',50)">
  ROSE
  <span>50 💰</span>
</div>
<div class="store-card" onclick="buyColor('#55efc4',50)">
  MINT
  <span>50 💰</span>
</div>
<div class="store-card" onclick="buyColor('#74b9ff',50)">
  SKY
  <span>50 💰</span>
</div>
<div class="store-card" onclick="buyTag('DEV',0)">
  DEV TAG
  <span>0 💰</span>
</div>
<div class="store-card" onclick="buyTag('PRO',100)">
  PRO
  <span>100 💰</span>
</div>
<div class="store-card" onclick="buyTag('ELITE',150)">
  ELITE
  <span>150 💰</span>
</div>
<div class="store-card" onclick="sellNotePages()">
  SELL PAGES
  <span>25 💰 / 500 words</span>
</div>
    </div>
  </div>

</div>

<div class="page-controls" style="position:relative;bottom:auto;right:auto;margin-top:10px;">
  <button onclick="prevPage()">Prev</button>
  <button onclick="nextPage()">Next</button>
</div>

  <div id="stats-view" class="view">
  <h3>MY STATS</h3>
  <div id="my-stats" style="display:flex;flex-direction:column;gap:10px">
    <div>Level: <span id="stat-level">1</span></div>
    <div>Prestige: <span id="stat-prestige">0</span></div>
    <div>Credits: <span id="stat-credits">$0</span></div>
    <div>Words Written: <span id="stat-words">0</span></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"
import { getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"
import { getFirestore,doc,setDoc,collection,query,where,onSnapshot,addDoc,updateDoc,getDocs,orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"
import { getDatabase,ref,push,onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"

const firebaseConfig={
  apiKey:"AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
  authDomain:"infnotes.firebaseapp.com",
  projectId:"infnotes",
  databaseURL:"https://infnotes-default-rtdb.asia-southeast1.firebasedatabase.app/",
  storageBucket:"infnotes.firebasestorage.app",
  messagingSenderId:"976520833702",
  appId:"1:976520833702:web:ce8aa0afc1a6131da7e267"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)
const rtd=getDatabase(app)

let currentUser=null
let myData={}

const lvText = document.getElementById("my-lvl-text");
const starsEl = document.getElementById("my-stars");
const credsEl = document.getElementById("my-creds");
const chatHistory = document.getElementById("chat-history");
const chatIn = document.getElementById("chat-in");
const leaderboardList = document.getElementById("leaderboard-list");
const richEditor = document.getElementById("rich-editor");

// --- Auth ---
onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    document.getElementById("auth-overlay").style.display = "none";

    onSnapshot(doc(db,"users",user.uid),(snap)=>{
      myData = snap.data()||{};
      updateUserUI();
    });

    initChat();
  }
});

document.getElementById("login-btn").onclick = async ()=>{
  const e=document.getElementById("email").value
  const p=document.getElementById("pass").value
  try{
    await signInWithEmailAndPassword(auth,e,p)
  }catch{
    try{
      const cred = await createUserWithEmailAndPassword(auth,e,p)
      await setDoc(doc(db,"users",cred.user.uid),{
        email:e,
        credits:0,
        prestige:0,
        wordCount:0,
        activeTag:"",
        color:"#888",
        level:1
      })
    }catch(err){
      alert("Auth failed: "+err.message)
    }
  }
}

// --- UI Update ---
function updateUserUI(){
  lvText.textContent = "LVL "+(myData.level||1)
  starsEl.textContent = "★".repeat(myData.prestige||0)
  credsEl.textContent = "$"+(myData.credits||0)
}

// --- Chat ---
function initChat(){
  onChildAdded(ref(rtd,'messages'),(snap)=>{
    const m=snap.val()
    const div=document.createElement("div")
    div.className="msg-bubble"
    div.style.borderColor = m.color||"#151515"
    div.innerHTML=(m.tag? "["+m.tag+"] ":"")+m.sender+" "+("★".repeat(m.prestige||0))+"<br>"+m.text
    chatHistory.appendChild(div)
    chatHistory.scrollTop = chatHistory.scrollHeight
  })
}

document.getElementById("chat-send").onclick = ()=>{
  const t=chatIn.value
  if(!t)return
  push(ref(rtd,'messages'),{
    uid:currentUser.uid,
    sender:currentUser.email.split("@")[0],
    text:t,
    prestige:myData.prestige||0,
    tag:myData.activeTag||"",
    color:myData.color||"#888"
  })
  chatIn.value=""
}

// --- Notes ---
window.createNewNote = async ()=>{
  await addDoc(collection(db,"notes"),{
    title:"UNTITLED",
    content:"",
    access:[currentUser.uid],
    owner:currentUser.uid
  })
}

// --- Summarize ---
window.summarizeNote = ()=>{
  const text = richEditor.innerText
  const sentences = text.split(/[.!?]/)
  alert(sentences.slice(0,3).join(".")+".")
}

// --- Store ---
window.buyColor = async (color,price)=>{
  if((myData.credits||0)<price) return alert("Not enough credits")
  await updateDoc(doc(db,"users",currentUser.uid),{
    color:color,
    credits:(myData.credits||0)-price
  })
}

const TAG_SUPPLY={DEV:1,PRO:10,ELITE:5}
window.buyTag = async(tag,price)=>{
  if(TAG_SUPPLY[tag]<=0) return alert("Tag sold out")
  if((myData.credits||0)<price) return alert("Not enough credits")
  TAG_SUPPLY[tag]--
  await updateDoc(doc(db,"users",currentUser.uid),{
    activeTag:tag,
    credits:(myData.credits||0)-price
  })
}

window.sellNotePages = async ()=>{
  const words = richEditor.innerText.split(/\s+/).length
  const pages = Math.floor(words/500)
  const credits = pages*25
  await updateDoc(doc(db,"users",currentUser.uid),{
    credits:(myData.credits||0)+credits
  })
  alert("Sold "+pages+" pages")
}

// --- Leaderboard ---
window.renderLeaderboard = async ()=>{
  window.showView("leaderboard-view")
  const snap = await getDocs(query(collection(db,"users"),orderBy("wordCount","desc")))
  leaderboardList.innerHTML=""
  snap.forEach(d=>{
    const u=d.data()
    const row=document.createElement("div")
    row.innerText = u.email.split("@")[0]+" "+("★".repeat(u.prestige||0))+" "+u.wordCount
    leaderboardList.appendChild(row)
  })
}

// --- Notes Pagination ---
let PAGE_SIZE=500
let currentPage=0

window.nextPage=()=>{
  const words = richEditor.innerText.split(/\s+/)
  const pages=[]
  for(let i=0;i<words.length;i+=PAGE_SIZE) pages.push(words.slice(i,i+PAGE_SIZE).join(" "))
  if(currentPage<pages.length-1) currentPage++
  richEditor.innerText = pages[currentPage]
}

window.prevPage=()=>{
  currentPage--
  if(currentPage<0) currentPage=0
}

// --- Switch views ---
window.showView=(id)=>{
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))
  document.getElementById(id).classList.add("active")
}

  // Folders
async function loadFolders() {
  const snap = await getDocs(query(collection(db,"notes"), where("access","array-contains",currentUser.uid)));
  const folderList = document.getElementById("folders-list");
  folderList.innerHTML = "";

  const folders = {};

  snap.forEach(doc=>{
    const note = doc.data();
    const folder = note.folder || "General";
    if(!folders[folder]) folders[folder] = [];
    folders[folder].push({id:doc.id, title:note.title});
  });

  Object.keys(folders).forEach(folderName=>{
    const folderDiv = document.createElement("div");
    folderDiv.innerHTML = `<strong>${folderName}</strong>`;
    folders[folderName].forEach(note=>{
      const noteBtn = document.createElement("div");
      noteBtn.textContent = note.title;
      noteBtn.style.cursor = "pointer";
      noteBtn.onclick = ()=>loadNote(note.id);
      folderDiv.appendChild(noteBtn);
    });
    folderList.appendChild(folderDiv);
  });
}

window.createNewFolder = async () => {
  const folderName = prompt("Folder name:");
  if(!folderName) return;
  // Simply create a note in the new folder as placeholder
  await addDoc(collection(db,"notes"),{
    title:"UNTITLED",
    content:"",
    folder:folderName,
    access:[currentUser.uid],
    owner:currentUser.uid
  });
  loadFolders();
}

async function loadNote(noteId){
  const noteSnap = await getDoc(doc(db,"notes",noteId));
  const noteData = noteSnap.data();
  document.getElementById("note-title").value = noteData.title;
  richEditor.innerText = noteData.content || "";
  currentPage = 0;
}

// Update stats view whenever user data changes
function updateStatsUI(){
  document.getElementById("stat-level").textContent = myData.level||1;
  document.getElementById("stat-prestige").textContent = myData.prestige||0;
  document.getElementById("stat-credits").textContent = "$"+(myData.credits||0);
  document.getElementById("stat-words").textContent = myData.wordCount||0;
}

// Call this when user data updates
onSnapshot(doc(db,"users",currentUser.uid),(snap)=>{
  myData = snap.data()||{};
  updateUserUI();
  updateStatsUI();
});

// Call folder loader after auth
onAuthStateChanged(auth,user=>{
  if(user) loadFolders();
});
</script>

</body>
</html>
