<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfNotes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --panel: #0a0a0a; --accent: #a29bfe;
            --text: #888; --text-focus: #e0e0e0; --border: #151515;
            --sidebar-w: 240px; --xp: #fdcb6e; --star: #f1c40f; --credits: #00d2d3;
        }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* SIDEBAR */
        aside { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); padding: 35px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .nav-label { font-size: 0.6rem; color: #333; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px 10px; }
        .nav-item { padding: 8px 10px; cursor: pointer; font-size: 0.75rem; border-radius: 4px; display: flex; justify-content: space-between; color: var(--text); align-items: center; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { color: var(--text-focus); background: #111; }

        /* VIEWS */
        .view-container { flex: 1; display: flex; background: var(--bg); position: relative; }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; overflow-y: auto; }
        .view.active { display: flex; }

        /* EDITOR */
        #rich-editor { flex: 1; padding: 20px 80px; font-size: 1rem; line-height: 1.8; color: #c0c0c0; outline: none; overflow-y: auto; }
        #note-title { font-size: 2.2rem; background: transparent; border: none; color: var(--text-focus); padding: 60px 80px 10px 80px; font-weight: 600; width: 100%; }

        /* CARDS */
        .card-container { perspective: 1000px; width: 450px; height: 280px; margin: 20px auto; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 40px; border: 1px solid var(--border); border-radius: 12px; background: #0a0a0a; color: white; text-align: center; }
        .card-back { transform: rotateY(180deg); background: #111; color: var(--accent); }

        /* MARKET */
        .market-item { background: #0a0a0a; border: 1px solid #111; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .tag-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }

        /* CHAT */
        #chat-history { flex: 1; overflow-y: auto; padding: 25px 40px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { background: #111; padding: 10px 14px; border-radius: 12px; border: 1px solid #1a1a1a; color: #eee; font-size: 0.85rem; }

        /* UTILS */
        .xp-bar-container { width: 100%; height: 3px; background: #111; margin-top: 8px; border-radius: 2px; overflow: hidden; }
        #xp-fill { height: 100%; background: var(--xp); width: 0%; transition: 0.4s; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #0d0d0d; border: 1px solid #222; padding: 30px; border-radius: 10px; width: 380px; }
    </style>
</head>
<body>

    <div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
        <div style="width:300px; text-align:center;">
            <h1 style="letter-spacing:5px; color:white;">InfNotes</h1>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; background:0; border:1px solid #151515; color:white;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; background:0; border:1px solid #151515; color:white;">
            <button id="login-btn" style="width:100%; padding:12px; background:white; color:black; font-weight:600;">ENTER</button>
        </div>
    </div>

    <div id="collab-modal" class="modal">
        <div class="modal-content">
            <h4 style="color:white; margin:0 0 20px 0;">ADD COLLABORATOR</h4>
            <input type="text" id="collab-email" placeholder="User ID" style="width:100%; background:#111; border:1px solid #222; color:white; padding:12px; margin-bottom:20px;">
            <button onclick="addCollab()" style="width:100%; padding:12px; background:var(--accent); color:black; font-weight:600; border:0;">INVITE</button>
            <button onclick="closeModal()" style="width:100%; margin-top:10px; background:transparent; color:#444; border:0;">CLOSE</button>
        </div>
    </div>

    <aside>
        <div style="margin-bottom:30px;">
            <div style="display:flex; justify-content:space-between; font-size:0.6rem;">
                <span id="lvl-txt">LVL 1</span>
                <span id="stars-txt" style="color:var(--star)"></span>
            </div>
            <div class="xp-bar-container"><div id="xp-fill"></div></div>
            <div id="creds-txt" style="color:var(--credits); font-size:0.6rem; margin-top:5px;">$0 CREDITS</div>
        </div>
        <div class="nav-item active" onclick="showView('notes-view', this)">Notes</div>
        <div class="nav-item" onclick="showView('cards-view', this)">Flashcards</div>
        <div class="nav-item" onclick="showView('market-view', this)">Market</div>
        <div class="nav-item" onclick="loadLeaderboard(this)">Leaderboard</div>
        <div class="nav-item" onclick="showView('stats-view', this)">Profile</div>
        <div class="nav-item" onclick="showView('messages-view', this)">Chat</div>
        
        <div class="nav-label">Files</div>
        <div id="folder-root"></div>
        <button onclick="createNewNote()" style="margin-top:20px; background:0; color:#444; border:1px solid #151515; padding:10px; cursor:pointer; font-size:0.7rem;">+ NEW NOTE</button>
    </aside>

    <div class="view-container">
        <div id="notes-view" class="view active">
            <div style="position:absolute; top:20px; right:40px; display:flex; gap:10px;">
                <button onclick="openCollab()" style="background:0; border:1px solid #222; color:#555; padding:5px 10px; font-size:0.6rem; cursor:pointer;">SHARE</button>
            </div>
            <input type="text" id="note-title" placeholder="Untitled">
            <div id="rich-editor" contenteditable="true"></div>
        </div>

        <div id="market-view" class="view" style="padding:80px;">
            <h3 style="color:white; margin-bottom:40px;">TAG MARKET</h3>
            <div id="market-list">
                <div class="market-item">
                    <div><span class="tag-badge" style="background:#ff7675; color:white;">ELITE</span><div style="font-size:0.6rem; color:#444; margin-top:5px;">Costs $500</div></div>
                    <button onclick="buyTag('ELITE', 500)" style="background:white; border:0; padding:5px 15px; font-size:0.7rem; font-weight:600;">BUY</button>
                </div>
                <div class="market-item">
                    <div><span class="tag-badge" style="background:#74b9ff; color:white;">SCHOLAR</span><div style="font-size:0.6rem; color:#444; margin-top:5px;">Costs $200</div></div>
                    <button onclick="buyTag('SCHOLAR', 200)" style="background:white; border:0; padding:5px 15px; font-size:0.7rem; font-weight:600;">BUY</button>
                </div>
            </div>
        </div>

        <div id="cards-view" class="view" style="padding:80px;">
            <div id="deck-list-ui">
                <div id="deck-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:20px;"></div>
            </div>
            <div id="study-ui" style="display:none;">
                <button onclick="exitDeck()" style="background:0; border:0; color:#444; margin-bottom:20px;">< BACK</button>
                <div class="card-container" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                    <div class="card-inner"><div class="card-front" id="card-q"></div><div class="card-back" id="card-a"></div></div>
                </div>
                <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                    <button onclick="deferCard()" style="background:#111; color:var(--xp); border:1px solid #333; padding:12px 20px;">LATER</button>
                    <button onclick="nextCard(true)" style="background:var(--accent); color:black; padding:12px 20px; font-weight:600;">MASTERED</button>
                </div>
            </div>
        </div>

        <div id="stats-view" class="view" style="padding:80px; align-items:center;">
            <h3 style="color:white; margin-bottom:40px;">PROFILE</h3>
            <div style="display:grid; grid-template-columns:repeat(2, 200px); gap:20px; margin-bottom:40px;">
                <div style="background:#0a0a0a; border:1px solid #111; padding:30px; border-radius:12px; text-align:center;">
                    <div style="font-size:3rem; color:white;" id="st-xp">0</div><div style="font-size:0.6rem; color:#444;">TOTAL XP</div>
                </div>
                <div style="background:#0a0a0a; border:1px solid #111; padding:30px; border-radius:12px; text-align:center;">
                    <div style="font-size:3rem; color:var(--star);" id="st-pres">0</div><div style="font-size:0.6rem; color:#444;">STARS</div>
                </div>
            </div>
            <div id="my-tags-ui" style="display:flex; gap:10px; margin-bottom:20px;"></div>
            <button id="prestige-btn" onclick="doPrestige()" style="padding:15px 40px; background:var(--star); color:black; font-weight:800; border:none; display:none;">ASCEND TO PRESTIGE</button>
        </div>

        <div id="messages-view" class="view">
            <div id="chat-history"></div>
            <div style="padding:30px; border-top:1px solid var(--border); display:flex; gap:15px;">
                <input type="text" id="chat-in" style="flex:1; background:0; border:0; color:white;" placeholder="Message...">
                <button id="chat-send" style="background:0; border:0; color:var(--accent); font-weight:600;">SEND</button>
            </div>
        </div>

        <div id="leaderboard-view" class="view" style="padding:80px;"><div id="leader-list"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, addDoc, updateDoc, getDocs, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI", authDomain: "infnotes.firebaseapp.com", projectId: "infnotes", databaseURL: "https://infnotes-default-rtdb.asia-southeast1.firebasedatabase.app/", appId: "1:976520833702:web:ce8aa0afc1a6131da7e267" };
        const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app), rtd = getDatabase(app);

        let user, myData = {}, allNotes = [], allCards = [], activeDeck = [], curIdx = 0;

        onAuthStateChanged(auth, u => { if(u) { user = u; document.getElementById('auth-overlay').style.display='none'; init(); } });
        document.getElementById('login-btn').onclick = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(()=>createUserWithEmailAndPassword(auth,e,p));
        };

        function calculateLevel(xp) {
            let level = 1, req = 100;
            while(xp >= req) { xp -= req; req *= 1.1; level++; }
            return { level, progress: (xp/req)*100 };
        }

        async function init() {
            onSnapshot(doc(db, "users", user.uid), snap => {
                myData = snap.data() || { wordCount: 0, prestige: 0, credits: 0, tags: [] };
                const { level, progress } = calculateLevel(myData.wordCount);
                document.getElementById('lvl-txt').innerText = `LVL ${level}`;
                document.getElementById('xp-fill').style.width = progress + "%";
                document.getElementById('stars-txt').innerText = "★".repeat(myData.prestige);
                document.getElementById('creds-txt').innerText = `$${myData.credits || 0} CREDITS`;
                document.getElementById('st-xp').innerText = Math.floor(myData.wordCount);
                document.getElementById('st-pres').innerText = myData.prestige;
                document.getElementById('prestige-btn').style.display = level >= 50 ? 'block' : 'none';
                
                const tagUI = document.getElementById('my-tags-ui'); tagUI.innerHTML = '';
                (myData.tags || []).forEach(t => tagUI.innerHTML += `<span class="tag-badge" style="background:#333; color:white;">${t}</span>`);
            });

            onSnapshot(query(collection(db, "notes"), where("access", "array-contains", user.uid)), s => {
                allNotes = s.docs.map(d => ({id:d.id, ...d.data()})); renderSidebar();
            });

            onSnapshot(query(collection(db, "cards"), where("owner", "==", user.uid)), s => {
                allCards = s.docs.map(d => ({id:d.id, ...d.data()})); renderDecks();
            });

            onChildAdded(ref(rtd, 'messages'), s => {
                const m = s.val(), c = document.createElement('div');
                c.innerHTML = `<div style="font-size:0.6rem; color:#444;">${m.sender} ${m.tag ? '['+m.tag+']' : ''}</div><div class="msg-bubble">${m.text}</div>`;
                document.getElementById('chat-history').appendChild(c);
                document.getElementById('chat-history').scrollTop = 9999;
            });
        }

        /* NOTES & COLLAB */
        window.renderSidebar = () => {
            const root = document.getElementById('folder-root'); root.innerHTML = '';
            allNotes.forEach(n => {
                const i = document.createElement('div'); i.className = 'nav-item'; i.innerText = n.title;
                i.onclick = () => { window.curNoteId = n.id; document.getElementById('note-title').value = n.title; document.getElementById('rich-editor').innerHTML = n.content; showView('notes-view', i); };
                root.appendChild(i);
            });
        };
        window.createNewNote = async () => await addDoc(collection(db, "notes"), { title: "New Note", content: "", access: [user.uid], owner: user.uid });
        document.getElementById('rich-editor').oninput = () => {
            if(window.curNoteId) updateDoc(doc(db, "notes", window.curNoteId), { content: document.getElementById('rich-editor').innerHTML, title: document.getElementById('note-title').value, wordCount: document.getElementById('rich-editor').innerText.length });
        };
        window.openCollab = () => document.getElementById('collab-modal').style.display='flex';
        window.closeModal = () => document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
        window.addCollab = async () => {
            const id = document.getElementById('collab-email').value;
            if(window.curNoteId && id) { await updateDoc(doc(db, "notes", window.curNoteId), { access: arrayUnion(id) }); closeModal(); }
        };

        /* MARKET */
        window.buyTag = async (tag, cost) => {
            if((myData.credits || 0) >= cost) {
                await updateDoc(doc(db, "users", user.uid), { credits: myData.credits - cost, tags: arrayUnion(tag) });
                alert("Purchased " + tag);
            } else { alert("Not enough credits!"); }
        };

        /* FLASHCARDS */
        window.renderDecks = () => {
            const g = document.getElementById('deck-grid'); g.innerHTML = '';
            [...new Set(allCards.map(c => c.deck || 'GENERAL'))].forEach(n => {
                const d = document.createElement('div'); d.className = 'nav-item'; d.style = "background:#111; padding:20px; height:100px;";
                d.innerHTML = `<div>${n}</div>`;
                d.onclick = () => { activeDeck = allCards.filter(c=>(c.deck||'GENERAL')===n); curIdx=0; 
                    document.getElementById('deck-list-ui').style.display='none'; document.getElementById('study-ui').style.display='block'; showCard(); };
                g.appendChild(d);
            });
        };
        function showCard() {
            if(!activeDeck[curIdx]) { exitDeck(); return; }
            document.getElementById('card-q').innerText = activeDeck[curIdx].q;
            document.getElementById('card-a').innerText = activeDeck[curIdx].a;
            document.querySelector('.card-inner').classList.remove('flipped');
        }
        window.deferCard = () => { activeDeck.push(activeDeck.splice(curIdx, 1)[0]); showCard(); };
        window.nextCard = async (m) => { if(m) await updateDoc(doc(db, "users", user.uid), { wordCount: myData.wordCount + 5, credits: (myData.credits||0) + 2 }); curIdx++; showCard(); };
        window.exitDeck = () => { document.getElementById('deck-list-ui').style.display='block'; document.getElementById('study-ui').style.display='none'; };

        /* CORE */
        window.doPrestige = async () => { await updateDoc(doc(db, "users", user.uid), { wordCount: 0, prestige: (myData.prestige||0)+1 }); };
        window.loadLeaderboard = async (btn) => {
            showView('leaderboard-view', btn);
            const s = await getDocs(query(collection(db, "users"), orderBy("prestige", "desc"), orderBy("wordCount", "desc")));
            const l = document.getElementById('leader-list'); l.innerHTML = '<h3 style="color:white; margin-bottom:20px;">RANKINGS</h3>';
            s.forEach((d, i) => { const u = d.data(); l.innerHTML += `<div style="padding:15px; border-bottom:1px solid #111; display:flex; justify-content:space-between;"><span>${i+1}. ${u.email.split('@')[0]}</span><span>${Math.floor(u.wordCount)} XP</span></div>`; });
        };
        window.showView = (id, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(btn) btn.classList.add('active');
        };
        document.getElementById('chat-send').onclick = () => {
            const t = document.getElementById('chat-in').value;
            if(t) push(ref(rtd, 'messages'), { uid: user.uid, sender: user.email.split('@')[0], text: t, tag: (myData.tags||[])[0] });
            document.getElementById('chat-in').value = '';
        };
    </script>
</body>
</html>
