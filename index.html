<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfNotes | Core OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --panel: #111111; --accent: #bb86fc;
            --text: #e0e0e0; --text-dim: #666; --border: #222;
            --danger: #cf6679; --sidebar-w: 260px;
        }
        * { box-sizing: border-box; outline: none; transition: all 0.1s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        aside { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; z-index: 100; }
        #sidebar-search { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: white; font-size: 0.8rem; margin-bottom: 20px; }
        
        .folder-group { margin-bottom: 15px; }
        .folder-label { font-size: 0.65rem; font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
        .nav-group { position: relative; margin-left: 10px; border-left: 1px solid #222; padding-left: 15px; }
        .nav-item { padding: 8px 10px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); border-radius: 4px; display: flex; justify-content: space-between; position: relative; }
        .nav-item::before { content: ""; position: absolute; left: -15px; top: 18px; width: 10px; height: 1px; background: #222; }
        .nav-item:hover, .nav-item.active { color: var(--text); background: #1a1a1a; }
        .nav-item.active { color: var(--accent); }

        .view-container { flex: 1; display: flex; background: var(--bg); position: relative; overflow: hidden; }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; }
        .view.active { display: flex; }

        #rich-editor { flex: 1; padding: 40px 100px; font-size: 1.1rem; line-height: 1.8; color: #ccc; outline: none; overflow-y: auto; }
        #note-title { font-size: 2.5rem; background: transparent; border: none; color: white; font-weight: 700; padding: 40px 100px 10px 100px; }

        .todo-row { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border); }
        .pomo-box { margin-top: auto; padding: 20px 0; border-top: 1px solid #222; text-align: center; }
        #timer-display { font-size: 1.6rem; font-weight: 200; display: block; margin-bottom: 10px; }
        .btn-ghost { background: transparent; border: 1px solid #333; color: #888; padding: 4px 8px; font-size: 0.6rem; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
        <div style="width:320px; background:var(--panel); padding:40px; border-radius:12px; border:1px solid var(--border); text-align:center;">
            <h2 style="margin:0 0 20px 0; letter-spacing:-1px;">INFNOTES</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:white;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; background:#000; border:1px solid #333; color:white;">
            <button id="login-btn" style="width:100%; padding:12px; background:white; color:black; font-weight:700; border:none; cursor:pointer;">LOGIN</button>
        </div>
    </div>

    <aside>
        <div style="font-weight:700; font-size:0.75rem; letter-spacing:2px; margin-bottom:20px; color:var(--accent);">INFNOTES OS</div>
        <input type="text" id="sidebar-search" placeholder="SEARCH WORKSPACE..." oninput="searchLogic()">
        
        <div class="nav-item" onclick="showView('notes-view', this)">NOTES</div>
        <div class="nav-item" onclick="showView('todo-view', this)">TASKS</div>
        <div class="nav-item" onclick="showView('messages-view', this)">TEAM CHAT</div>
        <div class="nav-item" onclick="showView('stats-view', this)">ANALYTICS</div>

        <div class="folder-label" style="margin-top:25px;">FOLDERS</div>
        <div id="folder-root"></div>

        <button onclick="createNewNote()" style="margin-top:20px; background:var(--accent); color:black; border:none; padding:10px; border-radius:6px; font-weight:700; cursor:pointer;">NEW THOUGHT</button>

        <div class="pomo-box">
            <span id="timer-display">25:00</span>
            <div class="pomo-ctrl">
                <button id="pomo-start" class="btn-ghost">START</button>
                <button onclick="resetPomo()" class="btn-ghost">RESET</button>
            </div>
        </div>
    </aside>

    <div class="view-container">
        <div id="notes-view" class="view active">
            <div id="conflict-bar" style="display:none; background:#3d1a1a; color:#ff8a8a; padding:10px; text-align:center; font-size:0.7rem;">
                COLLABORATOR IS EDITING
            </div>
            <div style="display:flex; justify-content:flex-end; padding:20px 100px 0 0; gap:10px;">
                <button id="del-btn" class="btn-ghost" style="color:var(--danger); display:none;" onclick="deleteNote()">DELETE</button>
            </div>
            <input type="text" id="note-title" placeholder="UNTITLED NOTE">
            <div id="rich-editor" contenteditable="true"></div>
        </div>

        <div id="todo-view" class="view" style="padding:80px;">
            <h2 style="font-weight:300;">TASKS</h2>
            <div style="display:flex; gap:10px; margin-bottom:30px;">
                <input type="text" id="todo-in" style="flex:1; background:#111; border:1px solid #333; color:white; padding:12px;" placeholder="ADD TASK...">
                <button onclick="newTodo()" style="background:var(--accent); color:black; border:none; padding:0 25px; font-weight:700;">ADD</button>
            </div>
            <div id="todo-list"></div>
        </div>

        <div id="messages-view" class="view">
            <div id="chat-history" style="flex:1; overflow-y:auto; padding:30px;"></div>
            <div style="padding:20px; border-top:1px solid var(--border); display:flex; gap:10px;">
                <input type="text" id="chat-in" style="flex:1; background:#000; border:1px solid #333; color:white; padding:12px;" placeholder="MESSAGE...">
                <button id="chat-send" style="background:var(--accent); color:black; font-weight:700; padding:0 20px; border:none;">SEND</button>
            </div>
        </div>

        <div id="stats-view" class="view" style="padding:80px;">
            <h2 style="font-weight:300;">ANALYTICS</h2>
            <div id="stat-words" style="font-size:2.5rem; font-weight:200;">0 WORDS</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue, onDisconnect, serverTimestamp as rtdTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
            authDomain: "infnotes.firebaseapp.com",
            projectId: "infnotes",
            storageBucket: "infnotes.firebasestorage.app",
            messagingSenderId: "976520833702",
            appId: "1:976520833702:web:ce8aa0afc1a6131da7e267"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtd = getDatabase(app);

        let currentUser = null, currentNoteId = null, allNotes = [], lastContent = "";

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                currentUser = u;
                await setDoc(doc(db, "users", u.uid), { email: u.email, uid: u.uid }, { merge: true });
                document.getElementById('auth-overlay').style.display = 'none';
                init();
            }
        });

        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        function init() {
            onSnapshot(query(collection(db, "notes"), where("access", "array-contains", currentUser.uid)), (snap) => {
                allNotes = []; snap.forEach(d => allNotes.push({id: d.id, ...d.data()}));
                renderSidebar(allNotes);
                updateStats();
            });
            initChat();
        }

        function renderSidebar(notes) {
            const root = document.getElementById('folder-root');
            root.innerHTML = '';
            const folders = [...new Set(notes.map(n => n.folder || 'DRAFTS'))];
            folders.forEach(f => {
                const group = document.createElement('div');
                group.className = 'folder-group';
                group.innerHTML = `<div class="folder-label">${f}</div><div class="nav-group" id="f-${f}"></div>`;
                root.appendChild(group);
                notes.filter(n => (n.folder || 'DRAFTS') === f).forEach(n => {
                    const item = document.createElement('div');
                    item.className = `nav-item ${currentNoteId === n.id ? 'active' : ''}`;
                    item.innerHTML = `<span>${n.title || 'UNTITLED'}</span>`;
                    item.onclick = () => loadNote(n);
                    document.getElementById(`f-${f}`).appendChild(item);
                });
            });
        }

        window.searchLogic = () => {
            const term = document.getElementById('sidebar-search').value.toLowerCase();
            renderSidebar(allNotes.filter(n => n.title.toLowerCase().includes(term) || (n.folder || '').toLowerCase().includes(term)));
        };

        async function loadNote(n) {
            if (currentNoteId) set(ref(rtd, `presence/${currentNoteId}/${currentUser.uid}`), null);
            currentNoteId = n.id; lastContent = n.content || "";
            document.getElementById('note-title').value = n.title;
            document.getElementById('rich-editor').innerHTML = n.content;
            document.getElementById('del-btn').style.display = n.owner === currentUser.uid ? 'block' : 'none';
            trackPresence(n.id);
            showView('notes-view');
        }

        function trackPresence(id) {
            const pRef = ref(rtd, `presence/${id}/${currentUser.uid}`);
            set(pRef, currentUser.email.split('@')[0]);
            onDisconnect(pRef).remove();
            onValue(ref(rtd, `presence/${id}`), snap => {
                const users = Object.values(snap.val() || {}).filter(u => u !== currentUser.email.split('@')[0]);
                document.getElementById('conflict-bar').style.display = users.length ? 'block' : 'none';
            });
        }

        document.getElementById('rich-editor').oninput = async () => {
            if (!currentNoteId) return;
            const ui = document.getElementById('rich-editor').innerHTML;
            const snap = await getDocs(query(collection(db, "notes"), where("__name__", "==", currentNoteId)));
            const server = snap.docs[0].data();
            let final = ui;
            if (server.content !== lastContent) {
                final = server.content + "<br>--- MERGE ---<br>" + ui.replace(lastContent, "");
            }
            lastContent = final;
            updateDoc(doc(db, "notes", currentNoteId), { content: final, title: document.getElementById('note-title').value, updatedAt: serverTimestamp() });
        };

        let pTime = 1500, pId = null;
        document.getElementById('pomo-start').onclick = () => {
            if (pId) { clearInterval(pId); pId = null; }
            else { pId = setInterval(() => { pTime--; updatePomoUI(); }, 1000); }
        };
        function updatePomoUI() {
            const m = Math.floor(pTime/60), s = pTime%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
        }
        window.resetPomo = () => { pTime = 1500; updatePomoUI(); };

        window.createNewNote = async () => {
            const f = prompt("FOLDER?", "DRAFTS");
            await addDoc(collection(db, "notes"), { title: "NEW NOTE", content: "", folder: f || "DRAFTS", access: [currentUser.uid], owner: currentUser.uid, updatedAt: serverTimestamp() });
        };

        window.deleteNote = async () => { if(confirm("DELETE?")) { await deleteDoc(doc(db, "notes", currentNoteId)); showView('notes-view'); } };

        function initChat() {
            onChildAdded(ref(rtd, 'messages'), snap => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${m.uid === currentUser.uid ? 'sent' : 'received'}`;
                div.innerHTML = `<small style="display:block;opacity:0.5">${m.sender}</small>${m.text}`;
                document.getElementById('chat-history').appendChild(div);
                document.getElementById('chat-history').scrollTop = 99999;
            });
            document.getElementById('chat-send').onclick = () => {
                const t = document.getElementById('chat-in').value;
                if(t) push(ref(rtd, 'messages'), { uid: currentUser.uid, sender: currentUser.email.split('@')[0], text: t });
                document.getElementById('chat-in').value = '';
            };
        }

        function updateStats() {
            let w = 0; allNotes.forEach(n => w += (n.content || "").replace(/<[^>]*>/g, '').split(/\s+/).filter(x => x).length);
            document.getElementById('stat-words').innerText = w + " WORDS";
        }

        window.showView = (id, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.newTodo = () => {
            const val = document.getElementById('todo-in').value;
            if(!val) return;
            const row = document.createElement('div');
            row.className = 'todo-row';
            row.innerHTML = `<input type="checkbox"> <span>${val}</span>`;
            document.getElementById('todo-list').appendChild(row);
            document.getElementById('todo-in').value = '';
        };
    </script>
</body>
</html>
