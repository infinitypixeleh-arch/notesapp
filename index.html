<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfNotes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --panel: #0a0a0a; --accent: #a29bfe;
            --text: #888; --text-focus: #e0e0e0; --border: #151515;
            --sidebar-w: 240px; --online: #55efc4; --xp: #fdcb6e; 
            --star: #f1c40f; --credits: #00d2d3;
        }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        aside { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); padding: 35px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .nav-label { font-size: 0.6rem; color: #333; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px 10px; }
        .nav-item { padding: 8px 10px; cursor: pointer; font-size: 0.75rem; border-radius: 4px; display: flex; justify-content: space-between; color: var(--text); align-items: center; }
        .nav-item:hover, .nav-item.active { color: var(--text-focus); background: #111; }

        .view-container { flex: 1; display: flex; background: var(--bg); position: relative; }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; overflow-y: auto; }
        .view.active { display: flex; }

        #rich-editor { flex: 1; padding: 20px 80px; font-size: 1rem; line-height: 1.8; color: #c0c0c0; outline: none; overflow-y: auto; }
        #note-title { font-size: 2.2rem; background: transparent; border: none; color: var(--text-focus); padding: 60px 80px 10px 80px; font-weight: 600; }

        .msg-bubble { background: #111; padding: 12px 18px; border-radius: 8px; max-width: 70%; border: 1px solid #151515; color: #ccc; margin-bottom: 10px; }
        .msg-bubble.own { align-self: flex-end; border-color: var(--u-color, var(--accent)); }
        .tag-badge { font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; background: #222; color: #fff; margin-left: 5px; border: 1px solid #333; }

        .xp-bar-container { width: 100%; height: 3px; background: #111; margin-top: 8px; border-radius: 2px; overflow: hidden; }
        #xp-fill { height: 100%; background: var(--xp); width: 0%; transition: width 0.4s ease; }
        
        /* Flashcard Styling */
        .card-container { perspective: 1000px; width: 450px; height: 280px; margin: 40px auto; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 40px; border: 1px solid var(--border); border-radius: 12px; background: #0a0a0a; color: white; font-size: 1.2rem; }
        .card-back { transform: rotateY(180deg); background: #111; color: var(--accent); }

        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; margin-bottom: 40px;}
        .store-card { background: #0a0a0a; border: 1px solid #151515; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.75rem; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #0d0d0d; border: 1px solid #222; padding: 30px; border-radius: 10px; width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .nice-input { width: 100%; background: #151515; border: 1px solid #222; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 5px; outline: none; }
        .nice-input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="card-modal" class="modal">
        <div class="modal-content">
            <h4 style="margin: 0 0 20px 0; color: white; letter-spacing: 1px;">NEW FLASHCARD</h4>
            <div style="font-size: 0.6rem; color: #444; margin-bottom: 5px;">ADDING TO: <span id="target-deck-label" style="color:var(--accent)"></span></div>
            <input type="text" id="q-in" class="nice-input" placeholder="Question">
            <input type="text" id="a-in" class="nice-input" placeholder="Answer">
            <div style="display:flex; gap:10px;">
                <button onclick="saveNewCard()" style="flex:2; padding:12px; background:white; color:black; border:0; cursor:pointer; font-weight:600; border-radius:4px;">SAVE CARD</button>
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#222; color:white; border:0; cursor:pointer; border-radius:4px;">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
        <div style="width:300px; text-align:center;">
            <h1 style="letter-spacing:5px; color:white; font-weight:400;">INFNOTES</h1>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; background:transparent; border:1px solid #151515; color:white;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; background:transparent; border:1px solid #151515; color:white;">
            <button id="login-btn" style="width:100%; padding:12px; background:white; color:black; border:none; cursor:pointer; font-weight:600;">ENTER</button>
        </div>
    </div>

    <aside>
        <div id="my-rank-area" style="margin-bottom:30px;">
            <div style="display:flex; justify-content:space-between; font-size:0.6rem;">
                <span id="my-lvl-text">LVL 1</span>
                <span id="my-stars" style="color:var(--star)"></span>
            </div>
            <div class="xp-bar-container"><div id="xp-fill"></div></div>
            <div id="my-creds" style="color:var(--credits); font-size:0.6rem; margin-top:5px;">$0</div>
        </div>

        <div class="nav-item active" onclick="showView('notes-view', this)">Notes</div>
        <div class="nav-item" onclick="showView('cards-view', this)">Flashcards</div>
        <div class="nav-item" onclick="showView('messages-view', this)">Chat</div>
        <div class="nav-item" onclick="renderLeaderboard(this)">Leaderboard</div>
        <div class="nav-item" onclick="showView('store-view', this)">Market</div>
        <div class="nav-item" onclick="showMyProfile(this)">Profile</div>

        <div class="nav-label">Files</div>
        <div id="folder-root"></div>
        <button onclick="createNewNote()" style="margin-top:20px; background:transparent; color:#444; border:1px solid #151515; padding:10px; cursor:pointer; font-size:0.7rem;">+ NEW NOTE</button>

        <div class="nav-label">Squad</div>
        <div id="user-root"></div>
    </aside>

    <div class="view-container">
        <div id="notes-view" class="view active">
            <div style="position:absolute; top:30px; right:60px; display:flex; gap:15px;">
                <button onclick="shareNote()" style="color:var(--accent); background:transparent; border:none; cursor:pointer; font-size:0.7rem;">SHARE</button>
                <button onclick="deleteNote()" style="color:#633; background:transparent; border:none; cursor:pointer; font-size:0.7rem;">DELETE</button>
            </div>
            <input type="text" id="note-title" placeholder="Untitled">
            <div id="rich-editor" contenteditable="true"></div>
        </div>

        <div id="cards-view" class="view" style="padding:100px;">
            <div id="deck-list-container">
                <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 40px;">
                    <h3 style="color:white; font-weight:400; margin:0;">DECKS</h3>
                    <button onclick="createNewDeck()" style="background:transparent; border:1px solid var(--border); color:var(--text); padding:8px 15px; cursor:pointer; font-size:0.7rem;">+ NEW DECK</button>
                </div>
                <div id="deck-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:20px;"></div>
            </div>
            
            <div id="study-area" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 20px;">
                    <button onclick="exitDeck()" style="background:transparent; border:none; color:#555; cursor:pointer; font-size:0.7rem;">< BACK</button>
                    <h4 id="active-deck-title" style="color:white; margin:0; font-weight:400;"></h4>
                    <button onclick="openCardModal()" style="background:var(--accent); border:none; color:black; padding:5px 10px; cursor:pointer; font-size:0.6rem; font-weight:600;">+ ADD CARD</button>
                </div>
                <div class="card-container" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
                    <div class="card-inner">
                        <div class="card-front" id="card-q"></div>
                        <div class="card-back" id="card-a"></div>
                    </div>
                </div>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button onclick="nextCard(false)" style="background:#111; color:#555; border:1px solid #222; padding:12px 25px; cursor:pointer; border-radius:4px;">SKIP</button>
                    <button onclick="nextCard(true)" style="background:var(--accent); color:black; border:none; padding:12px 25px; cursor:pointer; font-weight:600; border-radius:4px;">MASTERED (+5 XP)</button>
                </div>
            </div>
        </div>

        <div id="leaderboard-view" class="view" style="padding:100px;">
            <h3 style="color:white; font-weight:400;">GLOBAL RANKINGS</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div id="store-view" class="view" style="padding:100px;">
            <h3 style="color:white; font-weight:400;">MARKET</h3>
            <div style="color:var(--credits); font-size:0.8rem; margin-bottom:30px;">CREDITS: <span id="store-balance">$0</span></div>
            
            <div class="nav-label">PRESTIGE</div>
            <div id="prestige-banner" style="display:none; margin-bottom:30px; padding:20px; border:1px solid #333; background:#0f0505;">
                <button onclick="prestigeNow()" style="background:#c0392b; color:white; border:none; padding:10px 20px; cursor:pointer;">ASCEND (PRESTIGE)</button>
            </div>

            <div class="nav-label">CHAT COLORS</div>
            <div class="store-grid" id="color-grid"></div>

            <div class="nav-label">NAME TAGS</div>
            <div class="store-grid" id="tag-grid"></div>
        </div>

        <div id="profile-view" class="view" style="padding:100px;">
            <h3 style="color:white; font-weight:400;">USER PROFILE</h3>
            <div id="p-words" style="font-size:3.5rem; color:white; font-weight:300;">0</div>
            <div style="font-size:0.7rem; color:var(--accent); letter-spacing:1px; margin-bottom:40px;">TOTAL XP</div>
            <div id="p-prestige" style="color:#ff7675;">PRESTIGE: 0</div>
            <div id="p-stars" style="font-size:1.5rem; color:var(--star)"></div>
        </div>

        <div id="messages-view" class="view">
            <div id="chat-history"></div>
            <div style="padding:30px 50px; border-top:1px solid var(--border); display:flex; gap:20px;">
                <input type="text" id="chat-in" style="flex:1; background:transparent; border:none; color:white;" placeholder="Broadcast to squad...">
                <button id="chat-send" style="background:transparent; border:none; color:var(--accent); cursor:pointer;">SEND</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
            authDomain: "infnotes.firebaseapp.com",
            projectId: "infnotes",
            databaseURL: "https://infnotes-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "infnotes.firebasestorage.app",
            messagingSenderId: "976520833702",
            appId: "1:976520833702:web:ce8aa0afc1a6131da7e267"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtd = getDatabase(app);

        let currentUser, currentNoteId, allNotes = [], myData = {}, presenceList = {}, allCards = [], currentDeckName = null, activeDeckCards = [], curCardIdx = 0;

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                currentUser = u;
                onSnapshot(doc(db, "users", u.uid), (snap) => {
                    myData = snap.data() || { credits: 0, prestige: 0, wordCount: 0, bonus: 0, color: '#a29bfe' };
                    updateUI();
                });
                set(ref(rtd, `online/${u.uid}`), true);
                onDisconnect(ref(rtd, `online/${u.uid}`)).remove();
                document.getElementById('auth-overlay').style.display = 'none';
                init();
            }
        });

        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        function calculateLvl(words) {
            let lvl = 1, wordsNeeded = 100;
            while (words >= wordsNeeded) { words -= wordsNeeded; wordsNeeded *= 1.1; lvl++; }
            return { lvl, progress: (words / wordsNeeded) * 100 };
        }

        async function init() {
            onSnapshot(query(collection(db, "notes"), where("access", "array-contains", currentUser.uid)), (snap) => {
                allNotes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderSidebar();
                syncProgress();
            });

            onSnapshot(query(collection(db, "cards"), where("owner", "==", currentUser.uid)), (snap) => {
                allCards = snap.docs.map(d => d.data());
                renderDecks();
            });

            onValue(ref(rtd, 'online'), (snap) => { presenceList = snap.val() || {}; renderUserList(); });

            onChildAdded(ref(rtd, 'messages'), (snap) => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = `msg-bubble ${m.uid === currentUser.uid ? 'own' : ''}`;
                if (m.color) div.style.setProperty('--u-color', m.color);
                const tag = m.tag ? `<span class="tag-badge">${m.tag}</span>` : "";
                div.innerHTML = `<div style="font-size:0.6rem; opacity:0.5;">${m.sender}${tag} ${"★".repeat(m.pres || 0)}</div><div>${m.text}</div>`;
                document.getElementById('chat-history').appendChild(div);
                document.getElementById('chat-history').scrollTop = 99999;
            });

            renderMarket();
        }

        async function syncProgress() {
            let total = (myData.bonus || 0);
            allNotes.forEach(n => total += (n.content || "").replace(/<[^>]*>/g, '').split(/\s+/).filter(x => x).length);
            const stats = calculateLvl(total);
            let creds = myData.credits || 0;
            if (stats.lvl > (myData.last_lvl || 1)) creds += (stats.lvl - (myData.last_lvl || 1)) * 10;
            
            await setDoc(doc(db, "users", currentUser.uid), {
                wordCount: total, last_lvl: stats.lvl, credits: creds, prestige: myData.prestige || 0, uid: currentUser.uid, email: currentUser.email, bonus: myData.bonus || 0, color: myData.color || '#a29bfe'
            }, { merge: true });
        }

        function updateUI() {
            const stats = calculateLvl(myData.wordCount || 0);
            document.getElementById('my-lvl-text').innerText = `LVL ${stats.lvl}`;
            document.getElementById('xp-fill').style.width = stats.progress + "%";
            document.getElementById('my-stars').innerText = "★".repeat(myData.prestige || 0);
            document.getElementById('my-creds').innerText = `$${myData.credits || 0}`;
            document.getElementById('store-balance').innerText = `$${myData.credits || 0}`;
            document.getElementById('prestige-banner').style.display = stats.lvl >= 50 ? 'block' : 'none';
        }

        /* Deck Logic */
        window.createNewDeck = () => {
            const name = prompt("DECK NAME?");
            if (name) {
                // To initialize a deck, we just save a placeholder or wait for first card
                currentDeckName = name.toUpperCase();
                startStudy(currentDeckName);
            }
        };

        window.renderDecks = () => {
            const grid = document.getElementById('deck-grid');
            grid.innerHTML = '';
            const deckNames = [...new Set(allCards.map(c => c.deck))];
            deckNames.forEach(name => {
                const count = allCards.filter(c => c.deck === name).length;
                const div = document.createElement('div');
                div.className = 'store-card';
                div.innerHTML = `${name}<br><small style="color:var(--accent)">${count} CARDS</small>`;
                div.onclick = () => startStudy(name);
                grid.appendChild(div);
            });
        };

        window.startStudy = (name) => {
            currentDeckName = name;
            activeDeckCards = allCards.filter(c => c.deck === name);
            document.getElementById('deck-list-container').style.display = 'none';
            document.getElementById('study-area').style.display = 'block';
            document.getElementById('active-deck-title').innerText = name;
            curCardIdx = 0;
            showCard();
        };

        function showCard() {
            const container = document.getElementById('study-area');
            if (activeDeckCards.length === 0) {
                document.getElementById('card-q').innerText = "NO CARDS YET";
                document.getElementById('card-a').innerText = "CLICK '+ ADD CARD'";
                return;
            }
            if (curCardIdx >= activeDeckCards.length) {
                alert("DECK FINISHED");
                exitDeck(); return;
            }
            document.getElementById('card-q').innerText = activeDeckCards[curCardIdx].q;
            document.getElementById('card-a').innerText = activeDeckCards[curCardIdx].a;
            document.querySelector('.card-inner').classList.remove('flipped');
        }

        window.nextCard = async (mastered) => {
            if (mastered && activeDeckCards.length > 0) {
                await updateDoc(doc(db, "users", currentUser.uid), { bonus: (myData.bonus || 0) + 5 });
            }
            curCardIdx++;
            showCard();
        };

        window.exitDeck = () => {
            document.getElementById('deck-list-container').style.display = 'block';
            document.getElementById('study-area').style.display = 'none';
            currentDeckName = null;
        };

        /* Modal Logic */
        window.openCardModal = () => {
            document.getElementById('target-deck-label').innerText = currentDeckName;
            document.getElementById('card-modal').style.display = 'flex';
        };
        window.closeModal = () => { document.getElementById('card-modal').style.display = 'none'; };
        window.saveNewCard = async () => {
            const q = document.getElementById('q-in').value;
            const a = document.getElementById('a-in').value;
            if (q && a && currentDeckName) {
                await addDoc(collection(db, "cards"), { q, a, deck: currentDeckName, owner: currentUser.uid });
                document.getElementById('q-in').value = '';
                document.getElementById('a-in').value = '';
                closeModal();
            }
        };

        /* Market Logic */
        function renderMarket() {
            const colors = [
                {n:'ROSE', c:'#ff7675'}, {n:'MINT', c:'#55efc4'}, {n:'GOLD', c:'#fdcb6e'},
                {n:'VIOLET', c:'#a29bfe'}, {n:'CYAN', c:'#00d2d3'}, {n:'ORANGE', c:'#ff9f43'}
            ];
            const tags = [{n:'ELITE', p:100}, {n:'GOAT', p:200}, {n:'SCHOLAR', p:150}, {n:'DEV', p:50}];
            
            document.getElementById('color-grid').innerHTML = colors.map(cl => `
                <div class="store-card" onclick="buyItem('color', '${cl.c}', 50)">
                    <div style="width:10px; height:10px; background:${cl.c}; margin:0 auto 10px; border-radius:50%;"></div>
                    ${cl.n} ($50)
                </div>
            `).join('');

            document.getElementById('tag-grid').innerHTML = tags.map(tg => `
                <div class="store-card" onclick="buyItem('tag', '${tg.n}', ${tg.p})">
                    '${tg.n}' TAG ($${tg.p})
                </div>
            `).join('');
        }

        window.buyItem = async (type, val, cost) => {
            if (myData.credits >= cost) {
                let update = { credits: myData.credits - cost };
                update[type] = val;
                await updateDoc(doc(db, "users", currentUser.uid), update);
            } else alert("INSUFFICIENT CREDITS");
        };

        /* Previous Core Functions Re-integrated */
        window.renderSidebar = () => {
            const root = document.getElementById('folder-root'); root.innerHTML = '';
            const folders = [...new Set(allNotes.map(n => n.folder || 'DRAFTS'))];
            folders.forEach(f => {
                const g = document.createElement('div');
                g.innerHTML = `<div class="nav-label">${f}</div><div id="f-${f}"></div>`;
                root.appendChild(g);
                allNotes.filter(n => (n.folder || 'DRAFTS') === f).forEach(n => {
                    const i = document.createElement('div');
                    i.className = `nav-item ${currentNoteId === n.id ? 'active' : ''}`;
                    i.innerText = n.title;
                    i.onclick = () => { 
                        currentNoteId = n.id; 
                        document.getElementById('note-title').value = n.title; 
                        document.getElementById('rich-editor').innerHTML = n.content; 
                        showView('notes-view', i);
                    };
                    document.getElementById(`f-${f}`).appendChild(i);
                });
            });
        };

        window.renderUserList = async () => {
            const root = document.getElementById('user-root'); root.innerHTML = '';
            const snap = await getDocs(collection(db, "users"));
            snap.forEach(d => {
                const u = d.data();
                const item = document.createElement('div');
                item.className = 'nav-item';
                const isOnline = presenceList[u.uid] ? 'style="color:var(--online)"' : '';
                item.innerHTML = `<span ${isOnline}>${u.email.split('@')[0].toUpperCase()}</span> <span style="color:var(--star)">${"★".repeat(u.prestige || 0)}</span>`;
                root.appendChild(item);
            });
        };

        window.renderLeaderboard = async (btn) => {
            showView('leaderboard-view', btn);
            const q = query(collection(db, "users"), orderBy("prestige", "desc"), orderBy("wordCount", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('leaderboard-list'); list.innerHTML = '';
            let r = 1;
            snap.forEach(d => {
                const u = d.data();
                list.innerHTML += `<div class="leaderboard-row"><div style="width:25px;">${r++}</div><div style="flex:1;">${u.email.split('@')[0].toUpperCase()} ${"★".repeat(u.prestige || 0)}</div><div>${u.wordCount} XP</div></div>`;
            });
        };

        window.showMyProfile = (btn) => {
            showView('profile-view', btn);
            document.getElementById('p-words').innerText = myData.wordCount || 0;
            document.getElementById('p-prestige').innerText = `PRESTIGE: ${myData.prestige || 0}`;
            document.getElementById('p-stars').innerText = "★".repeat(myData.prestige || 0);
        };

        window.showView = (id, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                btn.classList.add('active');
            }
        };

        window.createNewNote = async () => {
            const f = prompt("FOLDER NAME?");
            await addDoc(collection(db, "notes"), { title: "Untitled", content: "", folder: (f || "DRAFTS").toUpperCase(), access: [currentUser.uid], owner: currentUser.uid });
        };

        window.shareNote = async () => {
            const id = prompt("USER ID TO SHARE WITH?");
            if (id && currentNoteId) await updateDoc(doc(db, "notes", currentNoteId), { access: [...allNotes.find(n=>n.id==currentNoteId).access, id] });
        };

        window.deleteNote = async () => {
            if (currentNoteId && confirm("DELETE THIS NOTE?")) {
                await deleteDoc(doc(db, "notes", currentNoteId));
                location.reload();
            }
        };

        document.getElementById('rich-editor').oninput = () => {
            if (currentNoteId) updateDoc(doc(db, "notes", currentNoteId), { 
                content: document.getElementById('rich-editor').innerHTML, 
                title: document.getElementById('note-title').value 
            });
        };

        document.getElementById('chat-send').onclick = () => {
            const t = document.getElementById('chat-in').value;
            if(t) push(ref(rtd, 'messages'), { uid: currentUser.uid, sender: currentUser.email.split('@')[0], text: t, pres: myData.prestige, color: myData.color, tag: myData.tag || "" });
            document.getElementById('chat-in').value = '';
        };
    </script>
</body>
</html>
