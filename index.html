<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfNotes | Threaded Workspace</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --panel: #121212; --accent: #bb86fc;
            --text: #e0e0e0; --text-dim: #666; --border: #222;
            --danger: #cf6679; --sidebar-w: 260px;
        }
        * { box-sizing: border-box; outline: none; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* AUTH SYSTEM */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { text-align: left; width: 320px; }
        .auth-card h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; letter-spacing: -1px; }
        .auth-card p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: white; }
        .auth-btn { width: 100%; padding: 12px; background: white; color: black; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }

        /* THREADED SIDEBAR */
        aside { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; z-index: 100; }
        .nav-item { position: relative; padding: 8px 12px; cursor: pointer; font-size: 0.9rem; color: var(--text-dim); display: block; border-radius: 4px; }
        .nav-item:hover, .nav-item.active { color: var(--text); background: #1a1a1a; }
        
        .nav-group { position: relative; margin-left: 20px; margin-top: 4px; border-left: 1px solid #222; }
        .nav-group .nav-item { padding-left: 15px; }
        .nav-group .nav-item::before { content: ""; position: absolute; left: 0; top: 18px; width: 10px; height: 1px; background: #222; }

        .section-label { font-size: 0.7rem; text-transform: uppercase; color: #444; letter-spacing: 1px; margin: 20px 0 10px 0; font-weight: 700; }

        /* CONTENT VIEWS */
        .view-container { flex: 1; display: flex; background: var(--bg); position: relative; }
        .view { display: none; width: 100%; height: 100%; }
        .view.active { display: flex; }

        /* LIST & EDITOR */
        .list-pane { width: 300px; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; background: #0c0c0c; }
        .editor-pane { flex: 1; padding: 60px 80px; overflow-y: auto; max-width: 900px; margin: 0 auto; }
        
        #note-title { font-size: 2.2rem; background: transparent; border: none; color: white; font-weight: 600; margin-bottom: 20px; width: 100%; }
        #rich-editor { font-size: 1.1rem; line-height: 1.8; color: #ccc; min-height: 400px; outline: none; }
        #rich-editor:empty:before { content: "Start writing..."; color: var(--text-dim); }

        /* POMODORO */
        .pomodoro-container { margin-top: auto; padding: 20px; background: #000; border: 1px solid var(--border); border-radius: 12px; text-align: center; }
        #timer-display { font-size: 1.8rem; font-weight: 300; color: var(--text); cursor: pointer; display: block; margin-bottom: 10px; }
        #timer-display.running { color: var(--accent); text-shadow: 0 0 10px rgba(187, 134, 252, 0.4); }
        .pomo-btn { background: transparent; border: 1px solid #333; color: var(--text-dim); padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; margin: 0 4px; }

        /* TASKS */
        .todo-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .custom-cb { width: 18px; height: 18px; border: 1px solid #333; border-radius: 4px; margin-right: 12px; }
        .todo-item.done { opacity: 0.4; text-decoration: line-through; }
        .todo-item.done .custom-cb { background: var(--accent); border-color: var(--accent); }

        .add-folder-btn { font-size: 0.75rem; color: var(--accent); cursor: pointer; background: transparent; border: none; padding: 0; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1>InfNotes</h1>
            <p>Your digital second brain.</p>
            <input type="email" id="email" class="auth-input" placeholder="Email address">
            <input type="password" id="pass" class="auth-input" placeholder="Password">
            <button id="login-btn" class="auth-btn">Sign in or Create</button>
        </div>
    </div>

    <aside>
        <div style="font-size: 1rem; font-weight: 600; margin-bottom: 30px; letter-spacing: 1px;">WORKSPACE</div>
        
        <div class="section-label">Main</div>
        <div class="nav-item active" onclick="showView('notes-view', this)">Notes</div>
        <div class="nav-item" onclick="showView('todo-view', this)">Tasks</div>
        <div class="nav-item" onclick="showView('stats-view', this)">Statistics</div>

        <div class="section-label">Folders</div>
        <div id="folder-threads" class="nav-group"></div>
        <button class="add-folder-btn" onclick="addNewFolder()">+ New folder</button>

        <div class="pomodoro-container">
            <span id="timer-display" title="Click to set custom time">25:00</span>
            <div class="pomo-controls">
                <button id="pomo-start" class="pomo-btn">Start</button>
                <button id="pomo-reset" class="pomo-btn">Reset</button>
            </div>
        </div>
        <button onclick="auth.signOut()" style="background:transparent; border:none; color:var(--text-dim); margin-top:15px; font-size:0.7rem; cursor:pointer;">Logout</button>
    </aside>

    <div class="view-container">
        <div id="notes-view" class="view active">
            <div class="list-pane">
                <button onclick="createNewNote()" style="width:100%; padding:10px; background:#1a1a1a; color:white; border:1px solid #333; border-radius:6px; cursor:pointer; margin-bottom:20px;">+ New Note</button>
                <div id="notes-grid"></div>
            </div>
            <div class="editor-pane">
                <div id="save-status" style="font-size:0.7rem; color:var(--text-dim); margin-bottom:10px;">Cloud Synced</div>
                <input type="text" id="note-title" placeholder="Untitled">
                <div id="rich-editor" contenteditable="true"></div>
                <button onclick="deleteNote()" style="margin-top:40px; background:transparent; border:1px solid var(--danger); color:var(--danger); padding:6px 12px; border-radius:4px; cursor:pointer; font-size:0.8rem;">Delete Note</button>
            </div>
        </div>

        <div id="todo-view" class="view">
            <div style="max-width: 600px; margin: 80px auto; width: 100%; padding:0 20px;">
                <h2 style="font-weight: 500;">Tasks</h2>
                <input type="text" id="todo-input" placeholder="Add a new task..." style="width:100%; background:transparent; border:none; border-bottom:1px solid #222; padding:12px 0; color:white; margin-bottom:20px;">
                <div id="todo-list"></div>
            </div>
        </div>

        <div id="stats-view" class="view">
            <div style="max-width: 800px; margin: 80px auto; width: 100%; padding: 0 40px;">
                <h2 style="font-weight: 500;">Metrics</h2>
                <div id="stats-render" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
            authDomain: "infnotes.firebaseapp.com",
            projectId: "infnotes",
            storageBucket: "infnotes.firebasestorage.app",
            messagingSenderId: "976520833702",
            appId: "1:976520833702:web:ce8aa0afc1a6131da7e267"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, currentNoteId = null, allNotes = [], userFolders = ['General', 'Work'];

        // --- AUTH ---
        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) { currentUser = u; document.getElementById('auth-overlay').style.display='none'; loadNotes(); }
            else { document.getElementById('auth-overlay').style.display='flex'; }
        });

        // --- UI & NAVIGATION ---
        window.showView = (vId, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(vId).classList.add('active');
            if(btn) btn.classList.add('active');
            if(vId === 'stats-view') updateStats();
        };

        const renderFolders = () => {
            const container = document.getElementById('folder-threads');
            container.innerHTML = '';
            userFolders.forEach(f => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = f;
                item.onclick = () => { showView('notes-view'); renderNotes(allNotes.filter(n => n.folder === f)); };
                container.appendChild(item);
            });
        };

        window.addNewFolder = () => {
            const name = prompt("Folder Name:");
            if(name) { userFolders.push(name); renderFolders(); }
        };

        // --- NOTES ENGINE ---
        const loadNotes = () => {
            onSnapshot(query(collection(db, "notes"), where("uid", "==", currentUser.uid)), (snap) => {
                allNotes = [];
                snap.forEach(d => allNotes.push({id: d.id, ...d.data()}));
                renderNotes(allNotes);
                renderFolders();
            });
        };

        const renderNotes = (notes) => {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = '';
            notes.forEach(n => {
                const item = document.createElement('div');
                item.style.padding = '12px'; item.style.marginBottom = '8px'; item.style.borderRadius = '6px'; item.style.cursor = 'pointer';
                item.style.border = currentNoteId === n.id ? '1px solid #333' : '1px solid transparent';
                item.style.background = currentNoteId === n.id ? '#1a1a1a' : 'transparent';
                item.innerHTML = `<div style="font-size:0.9rem;">${n.title || 'Untitled'}</div><div style="font-size:0.7rem; color:#444;">${n.folder || 'General'}</div>`;
                item.onclick = () => {
                    currentNoteId = n.id;
                    document.getElementById('note-title').value = n.title;
                    document.getElementById('rich-editor').innerHTML = n.content;
                    renderNotes(allNotes);
                };
                grid.appendChild(item);
            });
        };

        window.createNewNote = async () => {
            const f = prompt("Folder for this note?", "General");
            const dr = await addDoc(collection(db, "notes"), { uid: currentUser.uid, title: "", content: "", folder: f || "General", updatedAt: serverTimestamp() });
            currentNoteId = dr.id;
        };

        window.deleteNote = async () => {
            if(currentNoteId && confirm("Permanently delete?")) {
                await deleteDoc(doc(db, "notes", currentNoteId));
                currentNoteId = null;
                document.getElementById('note-title').value = "";
                document.getElementById('rich-editor').innerHTML = "";
            }
        };

        // --- AUTOSAVE ---
        let st;
        const autoSave = () => {
            if (!currentNoteId) return;
            document.getElementById('save-status').innerText = "Syncing...";
            clearTimeout(st);
            st = setTimeout(async () => {
                await setDoc(doc(db, "notes", currentNoteId), { 
                    title: document.getElementById('note-title').value, 
                    content: document.getElementById('rich-editor').innerHTML, 
                    uid: currentUser.uid, updatedAt: serverTimestamp() 
                }, { merge: true });
                document.getElementById('save-status').innerText = "Cloud Synced";
            }, 800);
        };
        document.getElementById('note-title').oninput = autoSave;
        document.getElementById('rich-editor').oninput = autoSave;

        // --- POMODORO ---
        let timeLeft = 1500, timerInt = null, isRunning = false, customDefault = 1500;
        const timerDisp = document.getElementById('timer-display');
        const startBtn = document.getElementById('pomo-start');

        function updateTimerDisp() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            timerDisp.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        startBtn.onclick = () => {
            if (isRunning) {
                clearInterval(timerInt);
                startBtn.innerText = "Start";
                timerDisp.classList.remove('running');
            } else {
                startBtn.innerText = "Pause";
                timerDisp.classList.add('running');
                timerInt = setInterval(() => {
                    if (timeLeft > 0) { timeLeft--; updateTimerDisp(); }
                    else { clearInterval(timerInt); alert("Session over!"); resetPomo(); }
                }, 1000);
            }
            isRunning = !isRunning;
        };

        const resetPomo = () => { clearInterval(timerInt); isRunning = false; timeLeft = customDefault; updateTimerDisp(); startBtn.innerText = "Start"; timerDisp.classList.remove('running'); };
        document.getElementById('pomo-reset').onclick = resetPomo;
        timerDisp.onclick = () => { const m = prompt("Minutes:", "25"); if(m) { customDefault = parseInt(m) * 60; resetPomo(); }};

        // --- TASKS ---
        document.getElementById('todo-input').onkeypress = (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const i = document.createElement('div');
                i.className = 'todo-item';
                i.innerHTML = `<div class="custom-cb"></div><span>${e.target.value}</span>`;
                i.onclick = () => i.classList.toggle('done');
                document.getElementById('todo-list').prepend(i);
                e.target.value = '';
            }
        };

        // --- STATS ---
        const updateStats = () => {
            let w = 0;
            allNotes.forEach(n => w += n.content.replace(/<[^>]*>/g, '').split(/\s+/).length);
            document.getElementById('stats-render').innerHTML = `
                <div style="border:1px solid #222; padding:20px; border-radius:8px;">
                    <div style="color:#666; font-size:0.75rem;">TOTAL WORDS</div>
                    <div style="font-size:1.5rem;">${w}</div>
                </div>
                <div style="border:1px solid #222; padding:20px; border-radius:8px;">
                    <div style="color:#666; font-size:0.75rem;">TOTAL NOTES</div>
                    <div style="font-size:1.5rem;">${allNotes.length}</div>
                </div>`;
        };
    </script>
</body>
</html>
