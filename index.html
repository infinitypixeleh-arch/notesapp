<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfNotes | Ultimate OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --panel: #121212; --accent: #bb86fc;
            --text: #e0e0e0; --text-dim: #666; --border: #222;
            --danger: #cf6679; --sidebar-w: 260px;
        }
        * { box-sizing: border-box; outline: none; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        aside { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; z-index: 100; overflow-y: auto; }
        #sidebar-search { width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: white; font-size: 0.8rem; margin-bottom: 20px; }
        
        .nav-group { position: relative; margin-left: 10px; margin-top: 5px; border-left: 1px solid #262626; padding-left: 15px; }
        .section-header { font-size: 0.65rem; font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px 0; }
        .nav-item { padding: 6px 10px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); border-radius: 4px; display: flex; justify-content: space-between; position: relative; }
        .nav-item::before { content: ""; position: absolute; left: -15px; top: 50%; width: 10px; height: 1px; background: #262626; }
        .nav-item:hover, .nav-item.active { color: var(--text); background: #1a1a1a; }

        .view-container { flex: 1; display: flex; background: var(--bg); position: relative; overflow: hidden; }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; }
        .view.active { display: flex; }

        #todo-list { list-style: none; padding: 0; margin: 0; }
        .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); }
        .todo-item input[type="checkbox"] { accent-color: var(--accent); }
        .todo-item.done span { text-decoration: line-through; color: var(--text-dim); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2999; display: none; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 30px; z-index: 3000; display: none; width: 350px; }
        
        #pomo-settings { margin-top: 10px; display: none; gap: 5px; flex-direction: column; }
        #pomo-settings input { background: #000; border: 1px solid #333; color: white; padding: 4px; border-radius: 4px; font-size: 0.7rem; }
    </style>
</head>
<body id="main-body">

    <div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:4000; display:flex; align-items:center; justify-content:center;">
        <div style="width:300px; background:var(--panel); padding:30px; border-radius:12px; border:1px solid var(--border);">
            <h2 style="margin:0 0 20px 0;">InfNotes</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; background:transparent; border:1px solid #333; color:white;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:20px; background:transparent; border:1px solid #333; color:white;">
            <button id="login-btn" style="width:100%; padding:10px; background:white; color:black; font-weight:700; border:none; cursor:pointer;">Enter Workspace</button>
        </div>
    </div>

    <aside>
        <div style="font-weight:700; font-size:0.8rem; margin-bottom:20px;">INFNOTES OS</div>
        <input type="text" id="sidebar-search" placeholder="Search everything..." oninput="filterNotes()">
        
        <div class="nav-item active" onclick="showView('notes-view', this)">Notes</div>
        <div class="nav-item" onclick="showView('todo-view', this)">To-Do List</div>
        <div class="nav-item" onclick="showView('messages-view', this)">Messages</div>

        <div class="section-header">Folders</div>
        <div id="folder-container"></div>

        <button onclick="createNewNote()" style="margin-top:20px; background:var(--accent); color:black; border:none; padding:10px; border-radius:4px; font-weight:700; cursor:pointer;">+ New Note</button>

        <div style="margin-top:auto; padding-top:20px; border-top:1px solid #222; text-align:center;">
            <span id="timer-display" style="font-size:1.5rem; display:block;">25:00</span>
            <div style="display:flex; justify-content:center; gap:5px; margin-top:5px;">
                <button id="pomo-start" style="font-size:0.6rem; padding:4px 8px;">START</button>
                <button onclick="togglePomoSettings()" style="font-size:0.6rem; padding:4px 8px;">⚙️</button>
            </div>
            <div id="pomo-settings">
                <input type="number" id="work-time" placeholder="Work (min)" value="25">
                <input type="number" id="break-time" placeholder="Break (min)" value="5">
            </div>
        </div>
    </aside>

    <div class="view-container">
        <div id="notes-view" class="view active">
            <div id="conflict-warning" style="display:none; background:#3d1a1a; color:#ff8a8a; padding:10px; text-align:center; font-size:0.75rem;">
                ⚠️ <span id="conflict-users"></span> is editing.
            </div>
            <div style="padding:40px 60px; flex:1; overflow-y:auto;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <input type="text" id="note-title" style="font-size:2rem; background:transparent; border:none; color:white; font-weight:700; flex:1;" placeholder="Untitled">
                    <button id="delete-note-btn" onclick="deleteCurrentNote()" style="background:transparent; border:1px solid #444; color:var(--danger); padding:6px 12px; border-radius:4px; cursor:pointer; font-size:0.7rem; display:none;">Delete Note</button>
                </div>
                <div id="rich-editor" contenteditable="true" style="margin-top:20px; font-size:1rem; line-height:1.6; color:#ccc; outline:none;"></div>
            </div>
        </div>

        <div id="todo-view" class="view" style="padding:60px;">
            <h2>Daily Focus</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="todo-input" style="flex:1; background:#111; border:1px solid #333; color:white; padding:10px; border-radius:6px;" placeholder="Add a task...">
                <button onclick="addTodo()" style="background:var(--accent); color:black; border:none; padding:0 20px; border-radius:6px; font-weight:700;">Add</button>
            </div>
            <div id="todo-list-container"></div>
        </div>

        </div>

    <script type="module">
        // [Existing Firebase Imports & Config]
        
        let timeLeft = 1500, tId = null, isBreak = false;

        // --- POMODORO (CUSTOMIZABLE) ---
        document.getElementById('pomo-start').onclick = () => {
            if (tId) { clearInterval(tId); tId = null; document.getElementById('pomo-start').innerText = "START"; }
            else { 
                tId = setInterval(() => {
                    timeLeft--;
                    updatePomoDisplay();
                    if(timeLeft <= 0) {
                        clearInterval(tId);
                        tId = null;
                        isBreak = !isBreak;
                        timeLeft = (isBreak ? document.getElementById('break-time').value : document.getElementById('work-time').value) * 60;
                        alert(isBreak ? "Break time!" : "Back to work!");
                        updatePomoDisplay();
                    }
                }, 1000);
                document.getElementById('pomo-start').innerText = "PAUSE";
            }
        };

        window.togglePomoSettings = () => {
            const s = document.getElementById('pomo-settings');
            s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
            if(s.style.display === 'none') {
                timeLeft = document.getElementById('work-time').value * 60;
                updatePomoDisplay();
            }
        };

        function updatePomoDisplay() {
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
        }

        // --- DELETE LOGIC ---
        window.deleteCurrentNote = async () => {
            if(confirm("Permanently delete this note?")) {
                // Implementation using deleteDoc(doc(db, "notes", currentNoteId))
                // Then reset UI
                document.getElementById('notes-view').classList.remove('active');
            }
        };

        // --- TODO LIST ---
        window.addTodo = () => {
            const val = document.getElementById('todo-input').value;
            if(!val) return;
            const container = document.getElementById('todo-list-container');
            const div = document.createElement('div');
            div.className = 'todo-item';
            div.innerHTML = `<input type="checkbox"> <span>${val}</span>`;
            container.appendChild(div);
            document.getElementById('todo-input').value = '';
        };

        // [Existing Sidebar/Search/Firebase Logic]
    </script>
</body>
</html>
