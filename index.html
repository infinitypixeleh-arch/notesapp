<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>infnotes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --panel: #0a0a0a; --accent: #a29bfe;
            --text: #888; --text-focus: #e0e0e0; --border: #151515;
            --sidebar-w: 240px;
        }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* sidebar */
        aside { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); padding: 35px 20px; display: flex; flex-direction: column; }
        #sidebar-search { width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 10px; color: var(--text-focus); font-size: 0.75rem; margin-bottom: 25px; transition: border 0.3s; }
        #sidebar-search:focus { border-color: #333; }
        
        .nav-label { font-size: 0.6rem; color: #333; text-transform: lowercase; letter-spacing: 2px; margin: 25px 0 10px 10px; }
        .nav-group { margin-left: 10px; border-left: 1px solid #111; padding-left: 15px; }
        .nav-item { padding: 6px 10px; cursor: pointer; font-size: 0.8rem; border-radius: 4px; display: flex; justify-content: space-between; position: relative; color: var(--text); text-transform: lowercase; }
        .nav-item:hover, .nav-item.active { color: var(--text-focus); }
        .nav-item.active { background: #111; }

        /* content views */
        .view-container { flex: 1; display: flex; background: var(--bg); position: relative; }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; }
        .view.active { display: flex; }

        /* editor */
        #rich-editor { flex: 1; padding: 20px 80px; font-size: 0.95rem; line-height: 1.8; color: #c0c0c0; outline: none; overflow-y: auto; }
        #note-title { font-size: 2rem; background: transparent; border: none; color: var(--text-focus); padding: 60px 80px 10px 80px; font-weight: 400; text-transform: lowercase; }

        /* tasks */
        .todo-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #111; font-size: 0.85rem; color: #aaa; }
        .todo-item.done span { text-decoration: line-through; opacity: 0.3; }
        input[type="checkbox"] { filter: invert(1) brightness(0.5); cursor: pointer; }

        /* utilities */
        .pomo-box { margin-top: auto; padding-top: 20px; text-align: center; border-top: 1px solid var(--border); }
        #timer-display { font-size: 1.1rem; font-weight: 300; color: #555; letter-spacing: 1px; }
        .btn-link { background: transparent; border: none; color: #444; padding: 5px 10px; font-size: 0.65rem; cursor: pointer; text-transform: lowercase; transition: color 0.2s; }
        .btn-link:hover { color: var(--accent); }

        button.primary { background: transparent; color: #666; border: 1px solid var(--border); padding: 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; text-transform: lowercase; }
        button.primary:hover { border-color: #333; color: var(--text-focus); }
    </style>
</head>
<body>

    <div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
        <div style="width:280px; text-align:center;">
            <h2 style="font-weight:300; color:white; letter-spacing:4px; margin-bottom:40px; text-transform:lowercase;">infnotes</h2>
            <input type="email" id="email" placeholder="email" style="width:100%; padding:12px; margin-bottom:12px; background:transparent; border:1px solid var(--border); color:white;">
            <input type="password" id="pass" placeholder="password" style="width:100%; padding:12px; margin-bottom:25px; background:transparent; border:1px solid var(--border); color:white;">
            <button id="login-btn" class="primary" style="width:100%;">enter</button>
        </div>
    </div>

    <aside>
        <div style="font-size:0.6rem; letter-spacing:3px; margin-bottom:35px; color:#222; text-transform:lowercase;">workspace // os</div>
        <input type="text" id="sidebar-search" placeholder="search..." oninput="searchLogic()">
        
        <div class="nav-item" onclick="showView('notes-view', this)">notes</div>
        <div class="nav-item" onclick="showView('todo-view', this)">tasks</div>
        <div class="nav-item" onclick="showView('messages-view', this)">chat</div>
        <div class="nav-item" onclick="showView('stats-view', this)">stats</div>

        <div class="nav-label">folders</div>
        <div id="folder-root"></div>

        <button onclick="createNewNote()" class="primary" style="margin-top:25px;">new thought</button>

        <div class="pomo-box">
            <span id="timer-display">25:00</span>
            <div style="margin-top:8px;">
                <button id="pomo-start" class="btn-link">start</button>
                <button onclick="resetPomo()" class="btn-link">reset</button>
            </div>
        </div>
    </aside>

    <div class="view-container">
        <div id="notes-view" class="view active">
            <div id="conflict-bar" style="display:none; background:#0f0505; color:#553333; padding:8px; text-align:center; font-size:0.6rem; letter-spacing:1px;">collaborator active</div>
            <div style="position:absolute; top:30px; right:60px;">
                <button id="del-btn" class="btn-link" style="color:#422; display:none;" onclick="deleteNote()">delete</button>
            </div>
            <input type="text" id="note-title" placeholder="untitled">
            <div id="rich-editor" contenteditable="true"></div>
        </div>

        <div id="todo-view" class="view" style="padding:100px;">
            <h3 style="font-weight:300; margin-bottom:40px; color:white; font-size:1rem; letter-spacing:1px;">tasks</h3>
            <div style="display:flex; gap:15px; margin-bottom:45px; border-bottom:1px solid #111;">
                <input type="text" id="todo-in" style="flex:1; background:transparent; border:none; color:white; padding:12px 0;" placeholder="add task...">
                <button onclick="newTodo()" class="btn-link" style="color:var(--accent)">add</button>
            </div>
            <div id="todo-list"></div>
        </div>

        <div id="stats-view" class="view" style="padding:100px;">
            <h3 style="font-weight:300; color:white; font-size:1rem; letter-spacing:1px;">stats</h3>
            <div id="stat-words" style="font-size:2.5rem; font-weight:300; margin-top:30px; color:white;">0 words</div>
            <div style="font-size:0.65rem; color:#333; margin-top:10px; letter-spacing:1px;">total lifetime production</div>
        </div>

        <div id="messages-view" class="view">
            <div id="chat-history" style="flex:1; overflow-y:auto; padding:50px; font-size:0.85rem; line-height:1.6;"></div>
            <div style="padding:30px 50px; border-top:1px solid var(--border); display:flex; gap:20px;">
                <input type="text" id="chat-in" style="flex:1; background:transparent; border:none; color:white;" placeholder="message...">
                <button id="chat-send" class="btn-link" style="color:var(--accent)">send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue, onDisconnect, serverTimestamp as rtdTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
            authDomain: "infnotes.firebaseapp.com",
            projectId: "infnotes",
            storageBucket: "infnotes.firebasestorage.app",
            messagingSenderId: "976520833702",
            appId: "1:976520833702:web:ce8aa0afc1a6131da7e267"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtd = getDatabase(app);

        let currentUser = null, currentNoteId = null, allNotes = [], lastContent = "";

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                currentUser = u;
                await setDoc(doc(db, "users", u.uid), { email: u.email, uid: u.uid }, { merge: true });
                document.getElementById('auth-overlay').style.display = 'none';
                init();
            }
        });

        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        function init() {
            // live notes & folders
            onSnapshot(query(collection(db, "notes"), where("access", "array-contains", currentUser.uid)), (snap) => {
                allNotes = []; snap.forEach(d => allNotes.push({id: d.id, ...d.data()}));
                renderSidebar(allNotes);
                updateStats();
            });

            // live tasks
            onSnapshot(query(collection(db, "tasks"), where("uid", "==", currentUser.uid)), (snap) => {
                const list = document.getElementById('todo-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const t = d.data();
                    const item = document.createElement('div');
                    item.className = `todo-item ${t.done ? 'done' : ''}`;
                    item.innerHTML = `<input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${d.id}', this.checked)"> <span>${t.text}</span>`;
                    list.appendChild(item);
                });
            });

            initChat();
        }

        // sidebar engine
        function renderSidebar(notes) {
            const root = document.getElementById('folder-root');
            root.innerHTML = '';
            const folders = [...new Set(notes.map(n => n.folder || 'drafts'))];
            folders.forEach(f => {
                const group = document.createElement('div');
                group.innerHTML = `<div class="nav-label">${f}</div><div class="nav-group" id="f-${f}"></div>`;
                root.appendChild(group);
                notes.filter(n => (n.folder || 'drafts') === f).forEach(n => {
                    const item = document.createElement('div');
                    item.className = `nav-item ${currentNoteId === n.id ? 'active' : ''}`;
                    item.innerHTML = `<span>${n.title || 'untitled'}</span>`;
                    item.onclick = () => loadNote(n);
                    document.getElementById(`f-${f}`).appendChild(item);
                });
            });
        }

        window.searchLogic = () => {
            const term = document.getElementById('sidebar-search').value.toLowerCase();
            renderSidebar(allNotes.filter(n => (n.title || '').toLowerCase().includes(term) || (n.folder || '').toLowerCase().includes(term)));
        };

        // editor engine
        async function loadNote(n) {
            if (currentNoteId) set(ref(rtd, `presence/${currentNoteId}/${currentUser.uid}`), null);
            currentNoteId = n.id; lastContent = n.content || "";
            document.getElementById('note-title').value = n.title;
            document.getElementById('rich-editor').innerHTML = n.content;
            document.getElementById('del-btn').style.display = n.owner === currentUser.uid ? 'block' : 'none';
            trackPresence(n.id);
            showView('notes-view');
        }

        function trackPresence(id) {
            const pRef = ref(rtd, `presence/${id}/${currentUser.uid}`);
            set(pRef, currentUser.email.split('@')[0]);
            onDisconnect(pRef).remove();
            onValue(ref(rtd, `presence/${id}`), snap => {
                const users = Object.values(snap.val() || {}).filter(u => u !== currentUser.email.split('@')[0]);
                document.getElementById('conflict-bar').style.display = users.length ? 'block' : 'none';
            });
        }

        document.getElementById('rich-editor').oninput = async () => {
            if (!currentNoteId) return;
            const ui = document.getElementById('rich-editor').innerHTML;
            const snap = await getDocs(query(collection(db, "notes"), where("__name__", "==", currentNoteId)));
            const server = snap.docs[0].data();
            let final = ui;
            if (server.content !== lastContent) {
                final = server.content + "<br>--- merge ---<br>" + ui.replace(lastContent, "");
            }
            lastContent = final;
            updateDoc(doc(db, "notes", currentNoteId), { content: final, title: document.getElementById('note-title').value, updatedAt: serverTimestamp() });
        };

        // tasks engine
        window.newTodo = async () => {
            const text = document.getElementById('todo-in').value;
            if (!text) return;
            await addDoc(collection(db, "tasks"), { uid: currentUser.uid, text, done: false, createdAt: serverTimestamp() });
            document.getElementById('todo-in').value = '';
        };

        window.toggleTask = async (id, done) => {
            await updateDoc(doc(db, "tasks", id), { done });
        };

        // chat engine
        function initChat() {
            onChildAdded(ref(rtd, 'messages'), snap => {
                const m = snap.val();
                const div = document.createElement('div');
                div.style.marginBottom = '15px';
                div.innerHTML = `<span style="color:#444; margin-right:10px;">${m.sender}</span> <span style="color:#999">${m.text}</span>`;
                document.getElementById('chat-history').appendChild(div);
                document.getElementById('chat-history').scrollTop = 99999;
            });
            document.getElementById('chat-send').onclick = () => {
                const t = document.getElementById('chat-in').value;
                if(t) push(ref(rtd, 'messages'), { uid: currentUser.uid, sender: currentUser.email.split('@')[0], text: t });
                document.getElementById('chat-in').value = '';
            };
        }

        // pomodoro
        let pTime = 1500, pId = null;
        document.getElementById('pomo-start').onclick = () => {
            if (pId) { clearInterval(pId); pId = null; }
            else { pId = setInterval(() => { pTime--; updatePomoUI(); }, 1000); }
        };
        function updatePomoUI() {
            const m = Math.floor(pTime/60), s = pTime%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
        }
        window.resetPomo = () => { pTime = 1500; updatePomoUI(); };

        // navigation
        window.showView = (id, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(btn) btn.classList.add('active');
        };

        window.createNewNote = async () => {
            const f = prompt("folder name?", "drafts");
            await addDoc(collection(db, "notes"), { title: "untitled", content: "", folder: f || "drafts", access: [currentUser.uid], owner: currentUser.uid, updatedAt: serverTimestamp() });
        };

        window.deleteNote = async () => { if(confirm("delete note?")) { await deleteDoc(doc(db, "notes", currentNoteId)); showView('notes-view'); } };

        function updateStats() {
            let w = 0; allNotes.forEach(n => w += (n.content || "").replace(/<[^>]*>/g, '').split(/\s+/).filter(x => x).length);
            document.getElementById('stat-words').innerText = w + " words";
        }
    </script>
</body>
</html>
