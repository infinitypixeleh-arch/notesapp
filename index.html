<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfNotes | The Complete OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --panel: #121212; --accent: #bb86fc;
            --text: #e0e0e0; --text-dim: #666; --border: #222;
            --danger: #cf6679; --sidebar-w: 260px;
        }
        * { box-sizing: border-box; outline: none; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* SIDEBAR & SEARCH */
        aside { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; z-index: 100; overflow-y: auto; }
        #sidebar-search { width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: white; font-size: 0.8rem; margin-bottom: 20px; }
        
        /* THREADED HIERARCHY */
        .nav-group { position: relative; margin-left: 10px; margin-top: 5px; border-left: 1px solid #262626; padding-left: 15px; }
        .folder-label { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 5px 0; display: flex; align-items: center; justify-content: space-between; }
        .nav-item { padding: 6px 10px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim); border-radius: 4px; display: flex; justify-content: space-between; position: relative; }
        .nav-item::before { content: ""; position: absolute; left: -15px; top: 50%; width: 10px; height: 1px; background: #262626; }
        .nav-item:hover, .nav-item.active { color: var(--text); background: #1a1a1a; }

        /* VIEWS */
        .view-container { flex: 1; display: flex; background: var(--bg); position: relative; overflow: hidden; }
        .view { display: none; width: 100%; height: 100%; flex-direction: column; }
        .view.active { display: flex; }

        /* MODALS & CHAT */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2999; display: none; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 30px; z-index: 3000; display: none; width: 350px; }
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; font-size: 0.85rem; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #000; }
        .msg.received { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; }
        .sender-tag { font-size: 0.65rem; font-weight: 700; color: var(--accent); cursor: pointer; margin-bottom: 2px; display: block; }

        #conflict-warning { display: none; background: #3d1a1a; color: #ff8a8a; padding: 10px; font-size: 0.75rem; text-align: center; border-bottom: 1px solid #632525; }
        .collapse-trigger { position: fixed; bottom: 20px; left: 20px; z-index: 1000; cursor: pointer; background: var(--panel); border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; color: var(--text-dim); }
        .sidebar-collapsed aside { margin-left: calc(var(--sidebar-w) * -1); }
    </style>
</head>
<body id="main-body">

    <div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:4000; display:flex; align-items:center; justify-content:center;">
        <div style="width:300px; background:var(--panel); padding:30px; border-radius:12px; border:1px solid var(--border);">
            <h2 style="margin:0 0 20px 0;">InfNotes</h2>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; background:transparent; border:1px solid #333; color:white;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:20px; background:transparent; border:1px solid #333; color:white;">
            <button id="login-btn" style="width:100%; padding:10px; background:white; color:black; font-weight:700; border:none; cursor:pointer;">Enter Workspace</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-bg" onclick="closeModals()"></div>
    <div id="profile-modal" class="modal">
        <h3 id="pop-name">Profile</h3>
        <div id="pop-stats" style="background:#000; padding:20px; border-radius:8px; text-align:center;">
            <div style="font-size:0.7rem; color:var(--text-dim);">LIFETIME WORDS</div>
            <div id="pop-words" style="font-size:1.5rem; font-weight:300;">0</div>
        </div>
        <button onclick="closeModals()" style="width:100%; margin-top:20px; padding:10px; background:transparent; border:1px solid #333; color:white;">Close</button>
    </div>

    <aside>
        <div style="font-weight:700; font-size:0.8rem; margin-bottom:20px; letter-spacing:1px;">INFNOTES OS</div>
        <input type="text" id="sidebar-search" placeholder="Search notes or folders..." oninput="filterNotes()">
        
        <div class="nav-item active" onclick="showView('notes-view', this)">Notes</div>
        <div class="nav-item" onclick="showView('messages-view', this)">Messages</div>
        <div class="nav-item" onclick="showView('stats-view', this)">Statistics</div>

        <div id="folder-container"></div>

        <button onclick="createNewNote()" style="margin-top:20px; background:var(--accent); color:black; border:none; padding:10px; border-radius:4px; font-weight:700; cursor:pointer;">+ New Note / Invite</button>

        <div style="margin-top:auto; padding-top:20px; border-top:1px solid #222; text-align:center;">
            <span id="timer-display" style="font-size:1.5rem; display:block;">25:00</span>
            <button id="pomo-start" style="font-size:0.6rem;">START</button>
        </div>
    </aside>

    <button class="collapse-trigger" onclick="toggleSidebar()">«</button>

    <div class="view-container">
        <div id="notes-view" class="view active">
            <div id="conflict-warning">⚠️ <span id="conflict-users"></span> is editing this note. Auto-merge enabled.</div>
            <div style="padding:60px 100px; flex:1; overflow-y:auto;">
                <input type="text" id="note-title" style="font-size:2.5rem; background:transparent; border:none; color:white; font-weight:700; width:100%;" placeholder="Untitled">
                <div id="rich-editor" contenteditable="true" style="margin-top:30px; font-size:1.1rem; line-height:1.7; color:#ccc; outline:none;"></div>
            </div>
        </div>

        <div id="messages-view" class="view">
            <div id="chat-history"></div>
            <div style="padding:20px; display:flex; gap:10px; border-top:1px solid var(--border);">
                <input type="text" id="msg-input" style="flex:1; background:#111; border:1px solid #333; color:white; padding:12px; border-radius:6px;" placeholder="Message team...">
                <button id="send-btn" style="background:var(--accent); color:black; font-weight:700; border:none; padding:0 20px; border-radius:6px;">Send</button>
            </div>
        </div>

        <div id="stats-view" class="view" style="padding:80px;">
            <h2>Workspace Stats</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:30px;">
                <div style="background:var(--panel); padding:30px; border-radius:12px; border:1px solid var(--border); text-align:center;">
                    <div style="font-size:0.7rem; color:var(--text-dim);">TOTAL WORDS</div>
                    <div id="total-words-display" style="font-size:2.5rem; font-weight:300;">0</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, addDoc, updateDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue, onDisconnect, serverTimestamp as rtdTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
            authDomain: "infnotes.firebaseapp.com",
            projectId: "infnotes",
            storageBucket: "infnotes.firebasestorage.app",
            messagingSenderId: "976520833702",
            appId: "1:976520833702:web:ce8aa0afc1a6131da7e267"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtd = getDatabase(app);

        let currentUser = null, currentNoteId = null, allNotes = [], lastSave = "";

        // --- AUTH ---
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                currentUser = u;
                await setDoc(doc(db, "users", u.uid), { email: u.email, uid: u.uid }, { merge: true });
                document.getElementById('auth-overlay').style.display = 'none';
                initOS();
            }
        });

        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        // --- HIERARCHY & SEARCH ---
        function initOS() {
            onSnapshot(query(collection(db, "notes"), where("access", "array-contains", currentUser.uid)), (snap) => {
                allNotes = []; snap.forEach(d => allNotes.push({id: d.id, ...d.data()}));
                renderSidebar(allNotes);
                updateStats();
            });
            initChat();
        }

        window.renderSidebar = (notes) => {
            const container = document.getElementById('folder-container');
            container.innerHTML = '';
            const folders = [...new Set(notes.map(n => n.folder || 'Uncategorized'))];

            folders.forEach(f => {
                const group = document.createElement('div');
                group.innerHTML = `<div class="folder-label">${f}</div>`;
                const list = document.createElement('div');
                list.className = 'nav-group';
                
                notes.filter(n => (n.folder || 'Uncategorized') === f).forEach(n => {
                    const item = document.createElement('div');
                    item.className = `nav-item ${currentNoteId === n.id ? 'active' : ''}`;
                    item.innerHTML = `<span>${n.title || 'Untitled'}</span> ${n.access.length > 1 ? '👥' : ''}`;
                    item.onclick = () => selectNote(n);
                    list.appendChild(item);
                });
                group.appendChild(list);
                container.appendChild(group);
            });
        };

        window.filterNotes = () => {
            const term = document.getElementById('sidebar-search').value.toLowerCase();
            const filtered = allNotes.filter(n => 
                n.title.toLowerCase().includes(term) || (n.folder || '').toLowerCase().includes(term)
            );
            renderSidebar(filtered);
        };

        // --- EDITOR & CONFLICTS ---
        async function selectNote(n) {
            if (currentNoteId) set(ref(rtd, `presence/${currentNoteId}/${currentUser.uid}`), null);
            currentNoteId = n.id;
            lastSave = n.content || "";
            document.getElementById('note-title').value = n.title;
            document.getElementById('rich-editor').innerHTML = n.content;
            trackPresence(n.id);
            showView('notes-view');
        }

        function trackPresence(id) {
            const pRef = ref(rtd, `presence/${id}/${currentUser.uid}`);
            set(pRef, currentUser.email.split('@')[0]);
            onDisconnect(pRef).remove();
            onValue(ref(rtd, `presence/${id}`), (snap) => {
                const users = snap.val() || {};
                const others = Object.values(users).filter(name => name !== currentUser.email.split('@')[0]);
                document.getElementById('conflict-warning').style.display = others.length ? 'block' : 'none';
                document.getElementById('conflict-users').innerText = others.join(', ');
            });
        }

        document.getElementById('rich-editor').oninput = async () => {
            if (!currentNoteId) return;
            const ui = document.getElementById('rich-editor').innerHTML;
            const snap = await getDocs(query(collection(db, "notes"), where("__name__", "==", currentNoteId)));
            const server = snap.docs[0].data();
            let final = ui;
            if (server.content !== lastSave) {
                final = server.content + "<br><hr><small>Auto-merged</small><br>" + ui.replace(lastSave, "");
            }
            lastSave = final;
            updateDoc(doc(db, "notes", currentNoteId), { content: final, title: document.getElementById('note-title').value, updatedAt: serverTimestamp() });
        };

        // --- STATS & PROFILES ---
        function updateStats() {
            let words = 0;
            allNotes.forEach(n => words += (n.content || "").replace(/<[^>]*>/g, '').split(/\s+/).filter(w => w.length > 0).length);
            document.getElementById('total-words-display').innerText = words;
        }

        window.openProfile = async (uid, name) => {
            document.getElementById('pop-name').innerText = name;
            document.getElementById('modal-bg').style.display = 'block';
            document.getElementById('profile-modal').style.display = 'block';
            const snap = await getDocs(query(collection(db, "notes"), where("owner", "==", uid)));
            let words = 0;
            snap.forEach(d => words += (d.data().content || "").replace(/<[^>]*>/g, '').split(/\s+/).filter(w => w.length > 0).length);
            document.getElementById('pop-words').innerText = words;
        };

        // --- CHAT ---
        function initChat() {
            onChildAdded(ref(rtd, 'messages'), (snap) => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${m.uid === currentUser.uid ? 'sent' : 'received'}`;
                div.innerHTML = `${m.uid !== currentUser.uid ? `<span class="sender-tag" onclick="openProfile('${m.uid}','${m.sender}')">${m.sender}</span>` : ''}${m.text}`;
                document.getElementById('chat-history').appendChild(div);
                document.getElementById('chat-history').scrollTop = 9999;
            });
            document.getElementById('send-btn').onclick = () => {
                const val = document.getElementById('msg-input').value;
                if(val) push(ref(rtd, 'messages'), { uid: currentUser.uid, sender: currentUser.email.split('@')[0], text: val, timestamp: rtdTimestamp() });
                document.getElementById('msg-input').value = '';
            };
        }

        // --- UI HELPERS ---
        window.showView = (id, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) btn.classList.add('active');
        };
        window.closeModals = () => {
            document.getElementById('modal-bg').style.display = 'none';
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        };
        window.toggleSidebar = () => document.getElementById('main-body').classList.toggle('sidebar-collapsed');

        window.createNewNote = async () => {
            const folder = prompt("Folder?", "General");
            const email = prompt("Collaborator Email? (Optional)");
            let access = [currentUser.uid];
            if (email) {
                const q = query(collection(db, "users"), where("email", "==", email.trim()));
                const s = await getDocs(q);
                if(!s.empty) access.push(s.docs[0].data().uid);
            }
            await addDoc(collection(db, "notes"), { title: "New Note", content: "", folder: folder || "General", access, owner: currentUser.uid, updatedAt: serverTimestamp() });
        };
    </script>
</body>
</html>
