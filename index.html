<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfNotes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;
  --panel:#111;
  --accent:#a29bfe;
  --accent2:#6c5ce7;
  --text:#ccc;
  --text-focus:#fff;
  --border:#222;
  --sidebar-w:250px;
  --card-bg:rgba(20,20,20,0.8);
  --card-shadow:0 6px 20px rgba(0,0,0,0.6);
  --hover-bg:rgba(160,155,254,0.15);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* Sidebar */
aside{
  width:var(--sidebar-w);
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}
aside h4{margin-bottom:5px;color:var(--accent);}
#my-lvl-text{font-weight:600;margin-bottom:5px;font-size:1.1rem;}
#my-stars{color:#fdcb6e;margin-bottom:5px;}
#my-creds{color:#00d2d3;margin-bottom:15px;}
.nav-item{
  padding:10px 12px;margin:5px 0;cursor:pointer;font-size:0.85rem;border-radius:6px;transition:0.2s;
}
.nav-item:hover{background:var(--accent);color:#111;font-weight:500;}
#folders-list div > div{cursor:pointer;padding:6px 8px;border-radius:5px;margin:2px 0;transition:0.2s;}
#folders-list div > div:hover{background:var(--hover-bg);}

/* Views */
.view-container{flex:1;display:flex;flex-direction:column;padding:20px;overflow:hidden;}
.view{display:none;flex-direction:column;height:100%;}
.view.active{display:flex;}

/* Notes editor */
#note-title{padding:10px;margin-bottom:10px;background:#222;color:#eee;border-radius:6px;border:1px solid var(--border);}
#rich-editor{
  flex:1;padding:20px;background:var(--card-bg);border-radius:12px;color:#eee;border:1px solid var(--border);
  box-shadow:var(--card-shadow);overflow-y:auto;line-height:1.6;outline:none;
}
.notes-controls{margin-top:10px;display:flex;gap:10px;justify-content:flex-start;}
.notes-controls button{
  padding:8px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;font-weight:600;border:none;border-radius:8px;
  cursor:pointer;transition:0.2s;box-shadow:0 3px 10px rgba(0,0,0,0.5);
}
.notes-controls button:hover{transform:scale(1.05);}

/* Pagination buttons */
.page-controls{margin-top:10px;display:flex;justify-content:center;gap:15px;}
.page-controls button{padding:8px 14px;border-radius:8px;background:linear-gradient(135deg,var(--accent2),var(--accent));font-weight:600;color:#111;transition:0.2s;box-shadow:0 3px 10px rgba(0,0,0,0.5);}
.page-controls button:hover{transform:scale(1.05);}

/* Chat */
#chat-history{flex:1;overflow-y:auto;padding:15px;}
.chat-bar{display:flex;margin-top:10px;}
#chat-in{flex:1;padding:10px;border-radius:6px;background:#222;color:#eee;margin-right:10px;border:1px solid var(--border);}
#chat-send{padding:10px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;font-weight:600;border-radius:6px;}

/* Chat bubbles */
.msg-bubble{background:var(--card-bg);padding:12px 18px;border-radius:12px;max-width:70%;border:1px solid var(--border);margin-bottom:8px;word-wrap:break-word;box-shadow:var(--card-shadow);}

/* Stats / Leaderboard */
#leaderboard-list div,#my-stats div{padding:10px;margin:5px 0;background:var(--card-bg);border-radius:10px;box-shadow:var(--card-shadow);}

/* Store */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px;margin-top:20px;}
.store-card{background:var(--card-bg);border:1px solid var(--border);padding:15px;border-radius:12px;text-align:center;cursor:pointer;transition:0.3s;box-shadow:var(--card-shadow);display:flex;flex-direction:column;justify-content:center;}
.store-card:hover{transform:scale(1.05);background:var(--hover-bg);}
.store-card span{margin-top:8px;font-size:0.85rem;color:#aaa;font-weight:500;}

/* Auth Overlay */
#auth-overlay{position:fixed;inset:0;background:#050505;display:flex;align-items:center;justify-content:center;z-index:5000;}
#auth-overlay input{width:100%;padding:12px;margin-bottom:10px;border-radius:6px;background:#222;color:#eee;border:1px solid var(--border);}
#auth-overlay button{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;font-weight:600;border-radius:6px;cursor:pointer;transition:0.2s;}
#auth-overlay button:hover{transform:scale(1.05);}
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-overlay">
  <div style="width:320px;text-align:center">
    <h1>INFNOTES</h1>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button id="login-btn">ENTER</button>
  </div>
</div>

<!-- Sidebar -->
<aside>
  <div id="my-lvl-text">LVL 1</div>
  <div id="my-stars">★</div>
  <div id="my-creds">$0</div>

  <div class="nav-item" onclick="showView('notes-view')">Notes</div>
  <div class="nav-item" onclick="showView('stats-view')">My Stats</div>
  <div class="nav-item" onclick="showView('leaderboard-view')">Leaderboard</div>
  <div class="nav-item" onclick="showView('store-view')">Market</div>

  <div id="folder-root">
    <h4>Folders</h4>
    <div id="folders-list"></div>
    <button onclick="createNewFolder()">+ New Folder</button>
  </div>

  <button onclick="createNewNote()" style="margin-top:10px;">NEW NOTE</button>
</aside>

<!-- Views container -->
<div class="view-container">
  <!-- Notes -->
  <div id="notes-view" class="view active">
    <input id="note-title" placeholder="Note Title">
    <div class="notes-controls">
      <button onclick="formatText('bold')">B</button>
      <button onclick="formatText('italic')">I</button>
      <button onclick="deleteCurrentNote()">Delete</button>
    </div>
    <div id="rich-editor" contenteditable="true"></div>
    <div class="page-controls">
      <button onclick="prevPage()">Prev</button>
      <button onclick="nextPage()">Next</button>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats-view" class="view">
    <h3>MY STATS</h3>
    <div id="my-stats" style="display:flex;flex-direction:column;gap:10px">
      <div>Level: <span id="stat-level">1</span></div>
      <div>Prestige: <span id="stat-prestige">0</span></div>
      <div>Credits: <span id="stat-credits">$0</span></div>
      <div>Words Written: <span id="stat-words">0</span></div>
    </div>
  </div>

  <!-- Leaderboard -->
  <div id="leaderboard-view" class="view">
    <h3>GLOBAL WORD LEADERBOARD</h3>
    <div id="leaderboard-list"></div>
  </div>

  <!-- Store View -->
<div id="store-view" class="view">
  <h3>RARITY STORE</h3>
  <div class="store-grid" id="store-grid"></div>
</div>

<script type="module">
// Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"
import { getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"
import { getFirestore,doc,setDoc,collection,query,where,onSnapshot,addDoc,updateDoc,getDocs,orderBy,getDoc,deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"
import { getDatabase,ref,push,onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"

// Firebase config
const firebaseConfig={apiKey:"AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",authDomain:"infnotes.firebaseapp.com",projectId:"infnotes",databaseURL:"https://infnotes-default-rtdb.asia-southeast1.firebasedatabase.app/",storageBucket:"infnotes.firebasestorage.app",messagingSenderId:"976520833702",appId:"1:976520833702:web:ce8aa0afc1a6131da7e267"}
const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)
const rtd=getDatabase(app)

let currentUser=null
let myData={}
let currentNoteId=null

const lvText = document.getElementById("my-lvl-text")
const starsEl = document.getElementById("my-stars")
const credsEl = document.getElementById("my-creds")
const richEditor = document.getElementById("rich-editor")
const leaderboardList = document.getElementById("leaderboard-list")

// ------------------- AUTH -------------------
onAuthStateChanged(auth, async user=>{
  if(user){
    currentUser=user
    document.getElementById("auth-overlay").style.display="none"
    onSnapshot(doc(db,"users",user.uid),(snap)=>{
      myData=snap.data()||{}
      updateUserUI()
      updateStatsUI()
    })
    loadFolders()
    initChat()
  }
})

document.getElementById("login-btn").onclick=async()=>{
  const e=document.getElementById("email").value
  const p=document.getElementById("pass").value
  try{await signInWithEmailAndPassword(auth,e,p)}
  catch{
    const cred = await createUserWithEmailAndPassword(auth,e,p)
    await setDoc(doc(db,"users",cred.user.uid),{email:e,credits:0,prestige:0,wordCount:0,activeTag:"",color:"#888",level:1})
  }
}

// ------------------- UI -------------------
function updateUserUI(){
  lvText.textContent="LVL "+(myData.level||1)
  starsEl.textContent="★".repeat(myData.prestige||0)
  credsEl.textContent="$"+(myData.credits||0)
}
function updateStatsUI(){
  document.getElementById("stat-level").textContent=myData.level||1
  document.getElementById("stat-prestige").textContent=myData.prestige||0
  document.getElementById("stat-credits").textContent="$"+(myData.credits||0)
  document.getElementById("stat-words").textContent=myData.wordCount||0
}

// ------------------- Notes & Folders -------------------
async function loadFolders(){
  const snap = await getDocs(query(collection(db,"notes"), where("access","array-contains",currentUser.uid)))
  const folderList = document.getElementById("folders-list")
  folderList.innerHTML=""
  const folders={}
  snap.forEach(doc=>{
    const note = doc.data()
    const folder = note.folder||"General"
    if(!folders[folder]) folders[folder]=[]
    folders[folder].push({id:doc.id,title:note.title})
  })
  Object.keys(folders).forEach(folderName=>{
    const folderDiv = document.createElement("div")
    folderDiv.innerHTML=`<strong>${folderName}</strong>`
    folders[folderName].forEach(note=>{
      const noteBtn=document.createElement("div")
      noteBtn.textContent=note.title
      noteBtn.onclick=()=>loadNote(note.id)
      folderDiv.appendChild(noteBtn)
    })
    folderList.appendChild(folderDiv)
  })
}

window.createNewFolder=async()=>{
  const folderName = prompt("Folder name:")
  if(!folderName) return
  const docRef = await addDoc(collection(db,"notes"),{title:"UNTITLED",content:"",folder:folderName,access:[currentUser.uid],owner:currentUser.uid})
  loadFolders()
}

window.createNewNote=async()=>{
  const docRef = await addDoc(collection(db,"notes"),{title:"UNTITLED",content:"",access:[currentUser.uid],owner:currentUser.uid})
  currentNoteId=docRef.id
  loadFolders()
}

async function loadNote(noteId){
  currentNoteId=noteId
  const noteSnap = await getDoc(doc(db,"notes",noteId))
  const noteData = noteSnap.data()
  document.getElementById("note-title").value = noteData.title
  richEditor.innerText = noteData.content||""
  currentPage=0
}

// Real-time saving
let saveTimeout=null
richEditor.addEventListener("input",()=>{
  if(!currentNoteId) return
  clearTimeout(saveTimeout)
  saveTimeout=setTimeout(async()=>{
    const content = richEditor.innerHTML
    await updateDoc(doc(db,"notes",currentNoteId),{content})
    updateWordCount()
  },500)
})
document.getElementById("note-title").addEventListener("input",()=>{
  if(!currentNoteId) return
  clearTimeout(saveTimeout)
  saveTimeout=setTimeout(async()=>{
    await updateDoc(doc(db,"notes",currentNoteId),{title:document.getElementById("note-title").value})
    loadFolders()
  },500)
})

// ------------------- Formatting -------------------
window.formatText=(cmd)=>document.execCommand(cmd,false,null)

// ------------------- Delete note -------------------
window.deleteCurrentNote=async()=>{
  if(!currentNoteId) return
  if(!confirm("Delete this note?")) return
  await deleteDoc(doc(db,"notes",currentNoteId))
  currentNoteId=null
  richEditor.innerText=""
  document.getElementById("note-title").value=""
  loadFolders()
}

// ------------------- Pagination -------------------
let PAGE_SIZE=500,currentPage=0
window.nextPage=()=>{
  const words=richEditor.innerText.split(/\s+/)
  const pages=[]
  for(let i=0;i<words.length;i+=PAGE_SIZE) pages.push(words.slice(i,i+PAGE_SIZE).join(" "))
  if(currentPage<pages.length-1) currentPage++
  richEditor.innerText=pages[currentPage]||""
}
window.prevPage=()=>{
  const words=richEditor.innerText.split(/\s+/)
  const pages=[]
  for(let i=0;i<words.length;i+=PAGE_SIZE) pages.push(words.slice(i,i+PAGE_SIZE).join(" "))
  if(currentPage>0) currentPage--
  richEditor.innerText=pages[currentPage]||""
}

// ------------------- Real-time leveling -------------------
async function updateWordCount(){
  const words = richEditor.innerText.split(/\s+/).filter(w=>w.trim()!=="").length
  const prevWordCount=myData.wordCount||0
  const totalWords=words+prevWordCount
  // Level formula: 100*1.1^(level-1)
  let lvl=1,exp=totalWords
  while(exp>=100*Math.pow(1.1,lvl-1)){exp-=100*Math.pow(1.1,lvl-1);lvl++}
  await updateDoc(doc(db,"users",currentUser.uid),{wordCount:totalWords,level:lvl})
}

// ------------------- Chat -------------------
function initChat(){
  const chatHistory=document.getElementById("chat-history")
  onChildAdded(ref(rtd,'messages'),snap=>{
    const m=snap.val()
    const div=document.createElement("div")
    div.className="msg-bubble"
    div.style.borderColor=m.color||"#151515"
    div.innerHTML=(m.tag? "["+m.tag+"] ":"")+m.sender+" "+("★".repeat(m.prestige||0))+"<br>"+m.text
    chatHistory.appendChild(div)
    chatHistory.scrollTop=chatHistory.scrollHeight
  })
}
document.getElementById("chat-send").onclick=()=>{
  const t=document.getElementById("chat-in").value
  if(!t) return
  push(ref(rtd,'messages'),{
    uid:currentUser.uid,
    sender:currentUser.email.split("@")[0],
    text:t,
    prestige:myData.prestige||0,
    tag:myData.activeTag||"",
    color:myData.color||"#888"
  })
  document.getElementById("chat-in").value=""
}

// ------------------- Leaderboard -------------------
window.renderLeaderboard=async()=>{
  window.showView("leaderboard-view")
  const snap = await getDocs(query(collection(db,"users"),orderBy("wordCount","desc")))
  leaderboardList.innerHTML=""
  snap.forEach(d=>{
    const u=d.data()
    const row=document.createElement("div")
    row.innerText=u.email.split("@")[0]+" LVL "+(u.level||1)+" "+("★".repeat(u.prestige||0))+" Words:"+u.wordCount+" TAG:"+u.activeTag
    leaderboardList.appendChild(row)
  })
}

// ------------------- Store & Summarize -------------------
window.summarizeNote=()=>{
  const sentences=richEditor.innerText.split(/[.!?]/)
  alert(sentences.slice(0,3).join(".")+".")
}

window.showView=id=>{
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))
  document.getElementById(id).classList.add("active")
}

// Store
window.buyColor=async(color,price)=>{
  if((myData.credits||0)<price){alert("Not enough credits"); return}
  await updateDoc(doc(db,"users",currentUser.uid),{color,credits:(myData.credits||0)-price})
}
const TAG_SUPPLY = { DEV: 1, PRO: 10, ELITE: 5 };

window.buyTag = async (tag, price) => {
  if (TAG_SUPPLY[tag] <= 0) {
    alert("Sold out!");
    return;
  }
  if ((myData.credits || 0) < price) {
    alert("Not enough credits");
    return;
  }

  TAG_SUPPLY[tag]--; // reduce supply
  await updateDoc(doc(db, "users", currentUser.uid), {
    activeTag: tag,
    credits: (myData.credits || 0) - price,
  });

  // Hide sold-out item
  if (TAG_SUPPLY[tag] <= 0) {
    const item = document.querySelector(`.store-card[data-type="tag"][data-key="${tag}"]`);
    if (item) item.style.display = "none";
  }
};
window.sellNotePages=async()=>{
  const words=richEditor.innerText.split(/\s+/).length
  const pages=Math.floor(words/500)
  const credits=pages*25
  await updateDoc(doc(db,"users",currentUser.uid),{credits:(myData.credits||0)+credits})
  alert("Sold "+pages+" pages")
}
  

const storeGrid = document.getElementById("store-grid");

// Load store items dynamically
async function loadStore() {
  const storeSnap = await getDocs(collection(db, "storeItems"));
  storeGrid.innerHTML = "";

  storeSnap.forEach(docSnap => {
    const item = docSnap.data();
    const div = document.createElement("div");
    div.className = "store-card";
    div.dataset.type = item.type;
    div.dataset.key = item.name;
    div.innerHTML = `${item.name}<span>${item.price} 💰</span>`;

    // Hide if supply is 0
    if (item.supply <= 0) div.style.display = "none";

    div.onclick = async () => {
      if (item.supply <= 0) { alert("Sold out!"); return; }
      if ((myData.credits || 0) < item.price) { alert("Not enough credits"); return; }

      // Deduct user credits
      await updateDoc(doc(db, "users", currentUser.uid), {
        credits: (myData.credits || 0) - item.price,
        ...(item.type==="tag" ? { activeTag: item.name } : { color: item.name })
      });

      // Deduct global supply in Firestore
      const itemRef = doc(db, "storeItems", item.name);
      await updateDoc(itemRef, { supply: item.supply - 1 });
    };

    storeGrid.appendChild(div);
  });
}

// Listen to live changes in store supply and auto-hide
onSnapshot(collection(db, "storeItems"), snap => {
  snap.forEach(docSnap => {
    const item = docSnap.data();
    const div = document.querySelector(`.store-card[data-key="${item.name}"]`);
    if (div) {
      div.style.display = (item.supply <= 0) ? "none" : "flex";
    }
  });
});

// Initial load
loadStore();
</script>
</body>
</html>
