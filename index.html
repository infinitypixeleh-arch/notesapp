<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfNotes | Organized Mind</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --panel: #141414; --accent: #bb86fc;
            --text: #e0e0e0; --text-dim: #888; --border: #262626;
            --danger: #cf6679; --sidebar-w: 240px; --list-w: 320px;
        }
        * { box-sizing: border-box; outline: none; transition: all 0.25s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 16px; border: 1px solid var(--border); text-align: center; width: 340px; }

        /* Navigation Sidebar */
        aside { width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 100; }
        aside.collapsed { margin-left: calc(var(--sidebar-w) * -1); }

        .nav-btn { padding: 12px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; color: var(--text-dim); border: none; background: transparent; text-align: left; width: 100%; font-size: 0.95rem; }
        .nav-btn:hover, .nav-btn.active { background: #1f1f1f; color: var(--accent); }

        .folder-link { font-size: 0.85rem; padding-left: 30px; opacity: 0.7; }

        /* Notes List Pane */
        .list-pane { width: var(--list-w); border-right: 1px solid var(--border); background: #0c0c0c; display: flex; flex-direction: column; z-index: 90; }
        .list-pane.collapsed { margin-left: calc(var(--list-w) * -1); }

        /* Main Viewport */
        .view-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        .view { display: none; width: 100%; height: 100%; }
        .view.active { display: flex; }

        /* Editor Area */
        .editor-pane { flex: 1; padding: 40px 60px; display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; position: relative; }
        #note-title { font-size: 2.5rem; background: transparent; border: none; color: white; margin-bottom: 10px; font-weight: 600; width: 100%; }
        
        .meta-bar { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .tag-pill { background: rgba(187, 134, 252, 0.15); color: var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; border: 1px solid rgba(187, 134, 252, 0.3); }
        
        select, .meta-input { background: #000; border: 1px solid var(--border); color: var(--text-dim); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }

        #rich-editor { flex: 1; font-size: 1.1rem; line-height: 1.8; overflow-y: auto; color: var(--text); white-space: pre-wrap; min-height: 300px; }
        #rich-editor:empty:before { content: "Capture a thought..."; color: var(--text-dim); }

        /* Stats & To-Do */
        .todo-item { background: var(--panel); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid var(--border); }
        .custom-cb { width: 22px; height: 22px; border: 2px solid var(--accent); border-radius: 6px; margin-right: 15px; cursor: pointer; }
        .todo-item.done span { text-decoration: line-through; color: var(--text-dim); }

        .toggle-tab { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: var(--accent); color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: var(--accent)">InfNotes</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="login-btn">Open Workspace</button>
        </div>
    </div>

    <button class="toggle-tab" onclick="toggleSidebars()">◧</button>

    <aside id="main-sidebar">
        <div style="font-weight: 600; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 2px;">INFNOTES</div>
        <button class="nav-btn active" onclick="showView('notes-view', this)">📝 All Notes</button>
        <div id="folder-list">
            </div>
        <button class="nav-btn" onclick="showView('todo-view', this)">✅ Tasks</button>
        <button class="nav-btn" onclick="showView('stats-view', this)">📊 Stats</button>
        
        <div style="margin-top:auto; text-align:center;">
            <span id="timer" style="display:block; font-size:1.5rem; margin-bottom:10px;">25:00</span>
            <button id="pomo-btn" style="background:var(--accent); color:#000; border:none; padding:5px 15px; border-radius:4px; cursor:pointer;">Focus</button>
        </div>
        <button onclick="auth.signOut()" style="background:transparent; border:none; color:var(--text-dim); margin-top:15px; cursor:pointer; font-size:0.8rem;">Logout</button>
    </aside>

    <div class="view-container">
        <div id="notes-view" class="view active">
            <div class="list-pane" id="notes-list-pane">
                <div style="padding: 20px;">
                    <button onclick="createNewNote()" style="width:100%; background:var(--accent); color:#000; border:none; padding:10px; border-radius:5px; font-weight:600; margin-bottom:15px; cursor:pointer;">+ New Note</button>
                    <input type="text" id="search-input" placeholder="Search everywhere..." style="width:100%; background:#000; border:1px solid var(--border); padding:10px; border-radius:5px; color:white;">
                </div>
                <div id="notes-grid" style="flex:1; overflow-y:auto; padding:0 20px 20px;"></div>
            </div>
            
            <div class="editor-pane">
                <div id="save-status" style="font-size:0.7rem; color:var(--text-dim); margin-bottom:10px;">Cloud Synced</div>
                <input type="text" id="note-title" placeholder="Untitled">
                
                <div class="meta-bar">
                    <select id="note-folder">
                        <option value="General">General</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                        <option value="Archive">Archive</option>
                    </select>
                    <input type="text" id="note-tags" class="meta-input" placeholder="Tags (comma separated)">
                    <div id="tag-display" style="display:flex; gap:5px;"></div>
                </div>

                <div id="rich-editor" contenteditable="true"></div>
                
                <button onclick="deleteCurrentNote()" style="margin-top:40px; background:transparent; border:1px solid var(--danger); color:var(--danger); padding:8px 15px; border-radius:5px; cursor:pointer; width: fit-content;">Delete Note</button>
            </div>
        </div>

        <div id="todo-view" class="view">
            <div style="max-width:600px; margin: 60px auto; width:100%; padding:20px;">
                <h1>Daily Tasks</h1>
                <input type="text" id="todo-input" placeholder="New task..." style="width:100%; background:transparent; border:none; border-bottom:2px solid var(--border); font-size:1.4rem; padding:15px 0; color:white;">
                <div id="todo-list" style="margin-top:30px;"></div>
            </div>
        </div>
        
        <div id="stats-view" class="view">
             <div id="stats-render" style="padding:60px; max-width:800px; margin:0 auto; display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
            authDomain: "infnotes.firebaseapp.com",
            projectId: "infnotes",
            storageBucket: "infnotes.firebasestorage.app",
            messagingSenderId: "976520833702",
            appId: "1:976520833702:web:ce8aa0afc1a6131da7e267"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, currentNoteId = null, allNotes = [], currentFolderFilter = 'All';

        // --- AUTH ---
        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) { currentUser = u; document.getElementById('auth-overlay').style.display='none'; loadNotes(); }
        });

        // --- UI LOGIC ---
        window.toggleSidebars = () => {
            document.getElementById('main-sidebar').classList.toggle('collapsed');
            document.getElementById('notes-list-pane').classList.toggle('collapsed');
        };

        window.showView = (vId, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(vId).classList.add('active');
            btn.classList.add('active');
            if(vId === 'stats-view') updateStats();
        };

        // --- FOLDER FILTERING ---
        const renderFolders = () => {
            const folderDiv = document.getElementById('folder-list');
            const folders = ["General", "Work", "Personal", "Archive"];
            folderDiv.innerHTML = '';
            folders.forEach(f => {
                const b = document.createElement('button');
                b.className = `nav-btn folder-link ${currentFolderFilter === f ? 'active' : ''}`;
                b.innerText = `📂 ${f}`;
                b.onclick = () => { currentFolderFilter = f; renderNotes(allNotes.filter(n => n.folder === f)); };
                folderDiv.appendChild(b);
            });
        };

        // --- NOTES ---
        const loadNotes = () => {
            onSnapshot(query(collection(db, "notes"), where("uid", "==", currentUser.uid)), (snap) => {
                allNotes = [];
                snap.forEach(d => allNotes.push({id: d.id, ...d.data()}));
                renderNotes(allNotes);
                renderFolders();
            });
        };

        const renderNotes = (notes) => {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = '';
            notes.forEach(n => {
                const card = document.createElement('div');
                card.className = `nav-btn ${n.id === currentNoteId ? 'active' : ''}`;
                card.innerHTML = `<strong>${n.title || 'Untitled'}</strong><br><small style="color:var(--accent)">${n.tags || ''}</small>`;
                card.onclick = () => selectNote(n);
                grid.appendChild(card);
            });
        };

        const selectNote = (n) => {
            currentNoteId = n.id;
            document.getElementById('note-title').value = n.title;
            document.getElementById('rich-editor').innerHTML = n.content;
            document.getElementById('note-folder').value = n.folder || "General";
            document.getElementById('note-tags').value = n.tags || "";
            updateTagPills(n.tags);
            renderNotes(allNotes);
        };

        const updateTagPills = (tagsStr) => {
            const display = document.getElementById('tag-display');
            display.innerHTML = '';
            if(!tagsStr) return;
            tagsStr.split(',').forEach(t => {
                const p = document.createElement('span');
                p.className = 'tag-pill';
                p.innerText = t.trim();
                display.appendChild(p);
            });
        };

        window.createNewNote = async () => {
            const dr = await addDoc(collection(db, "notes"), { uid: currentUser.uid, title: "", content: "", folder: "General", tags: "", updatedAt: serverTimestamp() });
            currentNoteId = dr.id;
        };

        // --- AUTOSAVE ---
        let st;
        const autoSave = () => {
            if (!currentNoteId) return;
            document.getElementById('save-status').innerText = "Syncing...";
            clearTimeout(st);
            st = setTimeout(async () => {
                const tags = document.getElementById('note-tags').value;
                updateTagPills(tags);
                await setDoc(doc(db, "notes", currentNoteId), { 
                    title: document.getElementById('note-title').value, 
                    content: document.getElementById('rich-editor').innerHTML, 
                    folder: document.getElementById('note-folder').value,
                    tags: tags,
                    uid: currentUser.uid, 
                    updatedAt: serverTimestamp() 
                }, { merge: true });
                document.getElementById('save-status').innerText = "Cloud Synced";
            }, 800);
        };
        document.getElementById('note-title').oninput = autoSave;
        document.getElementById('rich-editor').oninput = autoSave;
        document.getElementById('note-folder').onchange = autoSave;
        document.getElementById('note-tags').oninput = autoSave;

        // --- STATS ---
        const updateStats = () => {
            const statsDiv = document.getElementById('stats-render');
            let w = 0, c = 0;
            allNotes.forEach(n => {
                const t = n.content.replace(/<[^>]*>/g, '');
                w += t.split(/\s+/).filter(x => x.length > 0).length;
                c += t.length;
            });
            statsDiv.innerHTML = `
                <div style="background:var(--panel); padding:30px; border-radius:15px; text-align:center;"><span style="font-size:2rem; color:var(--accent);">${w}</span><br>Words Written</div>
                <div style="background:var(--panel); padding:30px; border-radius:15px; text-align:center;"><span style="font-size:2rem; color:var(--accent);">${allNotes.length}</span><br>Notes Saved</div>
            `;
        };

        // Other basic handlers (timer, delete) remain from previous version...
    </script>
</body>
</html>
