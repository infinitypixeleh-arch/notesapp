<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfNotes | Enterprise Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --panel: #121212; --accent: #bb86fc;
            --text: #e0e0e0; --text-dim: #666; --border: #222;
            --danger: #cf6679; --sidebar-w: 260px;
        }
        * { box-sizing: border-box; outline: none; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* SIDEBAR */
        aside { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; z-index: 100; }
        .nav-item { padding: 8px 12px; cursor: pointer; font-size: 0.9rem; color: var(--text-dim); border-radius: 4px; display: flex; justify-content: space-between; }
        .nav-item:hover, .nav-item.active { color: var(--text); background: #1a1a1a; }
        .section-label { font-size: 0.65rem; text-transform: uppercase; color: #444; letter-spacing: 1.5px; margin: 20px 0 8px 0; font-weight: 700; }

        /* VIEWS */
        .view-container { flex: 1; display: flex; background: var(--bg); overflow: hidden; position: relative; }
        .view { display: none; width: 100%; height: 100%; }
        .view.active { display: flex; }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2999; display: none; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 30px; z-index: 3000; display: none; width: 350px; }
        
        /* EDITOR & ALERTS */
        #conflict-warning { display: none; background: #3d1a1a; color: #ff8a8a; padding: 8px; font-size: 0.75rem; text-align: center; border-radius: 4px; margin-bottom: 10px; border: 1px solid #632525; }
        #rich-editor { min-height: 500px; outline: none; font-size: 1.1rem; line-height: 1.7; color: #ccc; }

        /* CHAT */
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #000; }
        .msg.received { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; }

        .btn-sm { padding: 4px 8px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; border: 1px solid #333; background: transparent; color: white; }
    </style>
</head>
<body id="main-body">

    <div id="auth-overlay">
        <div style="width: 300px; padding: 40px; background: var(--panel); border-radius: 12px;">
            <h2 style="margin-top:0;">InfNotes</h2>
            <input type="email" id="email" style="width:100%; padding:10px; margin-bottom:10px; background:transparent; border:1px solid #333; color:white;" placeholder="Email">
            <input type="password" id="pass" style="width:100%; padding:10px; margin-bottom:10px; background:transparent; border:1px solid #333; color:white;" placeholder="Password">
            <button id="login-btn" style="width:100%; padding:10px; background:var(--accent); color:black; font-weight:700; border:none; cursor:pointer;">Enter Workspace</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-bg" onclick="closeModals()"></div>
    <div id="profile-modal" class="modal">
        <h3 id="pop-name">Profile</h3>
        <div id="pop-stats" style="margin: 15px 0; font-size: 1.2rem; font-weight: 300;"></div>
        <button onclick="closeModals()" class="btn-sm">Close</button>
    </div>

    <div id="access-modal" class="modal">
        <h3>Manage Access</h3>
        <div id="access-list" style="margin: 20px 0;"></div>
        <button onclick="closeModals()" class="btn-sm">Done</button>
    </div>

    <aside>
        <div class="section-label">Main</div>
        <div class="nav-item active" onclick="showView('notes-view', this)">Notes</div>
        <div class="nav-item" onclick="showView('messages-view', this)">Messages</div>
        
        <div class="section-label">Your Workspace</div>
        <div id="notes-grid" style="overflow-y:auto; flex:1;"></div>
        <button onclick="createNewNote()" style="background:var(--accent); color:black; border:none; padding:8px; border-radius:4px; font-weight:600; cursor:pointer; margin-top:10px;">+ New / Invite</button>

        <div style="margin-top:20px; text-align:center; border-top:1px solid #222; padding-top:20px;">
            <span id="timer-display" style="font-size:1.5rem; display:block;">25:00</span>
            <button id="pomo-start" class="btn-sm" style="margin-top:5px;">Start</button>
        </div>
    </aside>

    <div class="view-container">
        <div id="notes-view" class="view active" style="flex-direction:column; padding:60px 100px;">
            <div id="conflict-warning">⚠️ <span id="conflict-users"></span> is editing this note. Auto-merge active.</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <input type="text" id="note-title" style="font-size:2.5rem; background:transparent; border:none; color:white; font-weight:600; flex:1;" placeholder="Untitled">
                <button id="manage-access-btn" class="btn-sm" style="display:none;" onclick="openAccessModal()">Manage Access</button>
            </div>
            <div id="rich-editor" contenteditable="true"></div>
        </div>

        <div id="messages-view" class="view" style="flex-direction:column;">
            <div id="chat-history"></div>
            <div style="padding:20px; display:flex; gap:10px; border-top:1px solid var(--border);">
                <input type="text" id="msg-input" style="flex:1; background:#111; border:1px solid #333; color:white; padding:12px; border-radius:6px;" placeholder="Message the team...">
                <button id="send-btn" style="padding:0 25px; background:var(--accent); color:black; font-weight:700; border:none; border-radius:6px; cursor:pointer;">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, onSnapshot, addDoc, getDocs, updateDoc, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue, onDisconnect, serverTimestamp as rtdTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfAii2ab63blH41Z4VvWZ0XvfydpZ99pI",
            authDomain: "infnotes.firebaseapp.com",
            projectId: "infnotes",
            storageBucket: "infnotes.firebasestorage.app",
            messagingSenderId: "976520833702",
            appId: "1:976520833702:web:ce8aa0afc1a6131da7e267"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtd = getDatabase(app);

        let currentUser = null, currentNoteId = null, lastServerContent = "";

        // --- AUTH & INDEX ---
        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                currentUser = u;
                await setDoc(doc(db, "users", u.uid), { email: u.email, uid: u.uid }, { merge: true });
                document.getElementById('auth-overlay').style.display='none';
                initWorkspace();
            }
        });

        // --- CORE LOGIC ---
        function initWorkspace() {
            onSnapshot(query(collection(db, "notes"), where("access", "array-contains", currentUser.uid)), (snap) => {
                const grid = document.getElementById('notes-grid');
                grid.innerHTML = '';
                snap.forEach(d => {
                    const n = d.data();
                    const item = document.createElement('div');
                    item.className = `nav-item ${currentNoteId === d.id ? 'active' : ''}`;
                    item.innerHTML = `<span>${n.title}</span> ${n.access.length > 1 ? '👥' : ''}`;
                    item.onclick = () => selectNote(d.id, n);
                    grid.appendChild(item);
                });
            });

            initChat();
        }

        async function selectNote(id, data) {
            // Presence cleanup
            if (currentNoteId) set(ref(rtd, `presence/${currentNoteId}/${currentUser.uid}`), null);
            
            currentNoteId = id;
            lastServerContent = data.content || "";
            document.getElementById('note-title').value = data.title;
            document.getElementById('rich-editor').innerHTML = data.content;
            document.getElementById('manage-access-btn').style.display = data.owner === currentUser.uid ? 'block' : 'none';
            
            trackPresence(id);
        }

        function trackPresence(noteId) {
            const pRef = ref(rtd, `presence/${noteId}/${currentUser.uid}`);
            set(pRef, currentUser.email.split('@')[0]);
            onDisconnect(pRef).remove();

            onValue(ref(rtd, `presence/${noteId}`), (snap) => {
                const users = snap.val() || {};
                const others = Object.values(users).filter(n => n !== currentUser.email.split('@')[0]);
                document.getElementById('conflict-warning').style.display = others.length ? 'block' : 'none';
                document.getElementById('conflict-users').innerText = others.join(', ');
            });
        }

        // --- AUTO-MERGE SAVE ---
        document.getElementById('rich-editor').oninput = async () => {
            if (!currentNoteId) return;
            const currentUI = document.getElementById('rich-editor').innerHTML;
            
            // Check if server changed while we were typing
            const freshDoc = await getDocs(query(collection(db, "notes"), where("__name__", "==", currentNoteId)));
            const serverData = freshDoc.docs[0].data();
            
            let finalContent = currentUI;
            if (serverData.content !== lastServerContent) {
                // AUTO-MERGE: Someone else saved! Append our new text to theirs.
                console.log("Merge Triggered");
                finalContent = serverData.content + "<br><hr><br>" + currentUI.replace(lastServerContent, "");
            }

            lastServerContent = finalContent;
            updateDoc(doc(db, "notes", currentNoteId), { 
                content: finalContent, 
                title: document.getElementById('note-title').value,
                updatedAt: serverTimestamp() 
            });
        };

        // --- USER MANAGEMENT ---
        window.openAccessModal = async () => {
            const snap = await getDocs(query(collection(db, "notes"), where("__name__", "==", currentNoteId)));
            const data = snap.docs[0].data();
            const list = document.getElementById('access-list');
            list.innerHTML = '';

            for (const uid of data.access) {
                const userSnap = await getDocs(query(collection(db, "users"), where("uid", "==", uid)));
                const email = userSnap.docs[0].data().email;
                const div = document.createElement('div');
                div.style.display = 'flex'; div.style.justifyContent = 'space-between'; div.style.marginBottom = '10px';
                div.innerHTML = `<span>${email}</span> 
                    ${uid !== currentUser.uid ? `<button onclick="removeUser('${uid}')" class="btn-sm" style="color:var(--danger)">Remove</button>` : '(Owner)'}`;
                list.appendChild(div);
            }
            document.getElementById('modal-bg').style.display = 'block';
            document.getElementById('access-modal').style.display = 'block';
        };

        window.removeUser = async (uid) => {
            if(confirm("Revoke access for this user?")) {
                await updateDoc(doc(db, "notes", currentNoteId), { access: arrayRemove(uid) });
                openAccessModal(); // Refresh
            }
        };

        window.createNewNote = async () => {
            const email = prompt("Invite someone? (Leave blank for private)");
            let access = [currentUser.uid];
            if (email) {
                const q = query(collection(db, "users"), where("email", "==", email.trim()));
                const s = await getDocs(q);
                if(!s.empty) access.push(s.docs[0].data().uid);
            }
            await addDoc(collection(db, "notes"), {
                title: "New Note", content: "", owner: currentUser.uid, access: access, updatedAt: serverTimestamp()
            });
        };

        // --- HELPERS ---
        window.closeModals = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('modal-bg').style.display = 'none';
        };

        function initChat() {
            onChildAdded(ref(rtd, 'messages'), (snap) => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${m.uid === currentUser.uid ? 'sent' : 'received'}`;
                div.innerHTML = `<small style="display:block;opacity:0.6">${m.sender}</small>${m.text}`;
                document.getElementById('chat-history').appendChild(div);
                document.getElementById('chat-history').scrollTop = 9999;
            });
            document.getElementById('send-btn').onclick = () => {
                const t = document.getElementById('msg-input').value;
                if(!t) return;
                push(ref(rtd, 'messages'), { uid: currentUser.uid, sender: currentUser.email.split('@')[0], text: t, timestamp: rtdTimestamp() });
                document.getElementById('msg-input').value = '';
            };
        }

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
